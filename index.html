// ── Supabase API helpers ──────────────────────────────────────────────────────
async function sbGet(table, match = "") {
  const url = `${SUPABASE_URL}/rest/v1/${table}${match}`;
  const res = await fetch(url, { headers: { ...headers } });
  if (!res.ok) throw new Error(`GET ${table} failed: ${res.status}`);
  return res.json();
}

async function sbUpsert(table, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { ...headers, "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`UPSERT ${table} failed: ${res.status} ${text}`);
  }
}

// ── Load / Save week_templates ────────────────────────────────────────────────
async function loadTemplates() {
  const rows = await sbGet("week_templates", "?id=eq.main");
  if (rows && rows.length > 0 && rows[0].data && Object.keys(rows[0].data).length > 0) {
    return rows[0].data; // already a JS object, Supabase parses jsonb
  }
  return null;
}

async function saveTemplates(templates) {
  await sbUpsert("week_templates", { id: "main", data: templates, updated_at: new Date().toISOString() });
}

// ── Load / Save reports ───────────────────────────────────────────────────────
// Reports keyed by "YYYY-MM-DD_slotId"
async function loadReportsForDate(date) {
  const rows = await sbGet("reports", `?id=like.${date}_*`);
  const map = {};
  (rows || []).forEach(r => {
    const slotId = r.id.replace(`${date}_`, "");
    map[slotId] = r.data;
  });
  return map;
}

async function saveReport(date, slotId, report) {
  const id = `${date}_${slotId}`;
  await sbUpsert("reports", { id, data: report, saved_at: new Date().toISOString() });
}

// Load ALL reports for a date range (for analytics)
async function loadReportsInRange(fromDate, toDate) {
  // Supabase pattern: id >= fromDate and id <= toDate+"_zzz"
  const rows = await sbGet("reports",
    `?id=gte.${fromDate}&id=lte.${toDate}_zzz&order=id.asc`);
  return rows || [];
}

const buildTemplate = (day) => {
  const times = slotTimesFor(day);
  if (isDualDay(day)) {
    return times.flatMap((time, i) => [
      { id: `slot_${i}_a`, time, room: "Room A", className: "", studentNames: [] },
      { id: `slot_${i}_b`, time, room: "Room B", className: "", studentNames: [] },
    ]);
  }
  return times.map((time, i) => ({ id: `slot_${i}`, time, room: null, className: "", studentNames: [] }));
};

const buildWeekTemplates = () =>
  Object.fromEntries(DAYS.map(d => [d, buildTemplate(d)]));

// Migrate/validate loaded templates to ensure correct structure
function migrateTemplates(raw) {
  const wt = raw || {};
  DAYS.forEach(d => {
    const expected = buildTemplate(d);
    if (!wt[d] || wt[d].length !== expected.length) {
      wt[d] = expected;
    } else {
      wt[d] = wt[d].map((slot, i) => ({
        ...slot,
        time:      expected[i]?.time || slot.time,
        room:      expected[i]?.room !== undefined ? expected[i].room : slot.room,
        id:        expected[i]?.id   || slot.id,
        classType: slot.classType || CLASS_TYPES[0],
        level:     slot.level     || "",
      }));
    }
  });
  return wt;
}

// ── Current time helpers ──────────────────────────────────────────────────────
// Returns "HH:MM" in 24h format for right now
const nowHHMM = () => {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
};

// Given an array of slots for today, find the one whose lesson is currently
// ongoing. A slot owns the hour from its start time until the next slot starts.
// Returns the slot object or null.
function getCurrentSlot(slots) {
  if (!slots || !slots.length) return null;
  const now = nowHHMM();
  // Get unique sorted times
  const times = [...new Set(slots.map(s => s.time))].sort();
  let activeTime = null;
  for (let i = 0; i < times.length; i++) {
    const start = times[i];
    const end   = times[i + 1] || "23:59";
    if (now >= start && now < end) { activeTime = start; break; }
  }
  if (!activeTime) return null;
  // If dual day, prefer Room A for the banner (both are "current")
  const matches = slots.filter(s => s.time === activeTime && s.className);
  return matches[0] || null;
}

// Returns all slots at the current time (for dual days, both rooms)
function getCurrentSlots(slots) {
  if (!slots || !slots.length) return [];
  const now = nowHHMM();
  const times = [...new Set(slots.map(s => s.time))].sort();
  let activeTime = null;
  for (let i = 0; i < times.length; i++) {
    const start = times[i];
    const end   = times[i + 1] || "23:59";
    if (now >= start && now < end) { activeTime = start; break; }
  }
  if (!activeTime) return [];
  return slots.filter(s => s.time === activeTime && s.className);
}

  }[variant] || {};
  return (
    <button onClick={onClick} disabled={disabled} style={{

      borderRadius: 8, padding: small ? "5px 12px" : "9px 18px",

};

// ── Student Mark ──────────────────────────────────────────────────────────────
function StudentMark({ name, mark, onChange }) {
  const cfg = {
    positive: { bg: C.greenBg,  col: C.green,  border: C.green  },
    negative: { bg: C.coralBg,  col: C.coral,  border: C.coral  },
    flag:     { bg: C.amberBg,  col: C.amber,  border: C.amber  },
    absent:   { bg: "#F3F4F6",  col: "#6B7280", border: "#9CA3AF" },
    none:     { bg: "transparent", col: C.muted, border: C.border },
  };
  const toggle = (type) => onChange(mark === type ? "none" : type);
  const active = cfg[mark] || cfg.none;
  const isAbsent = mark === "absent";

  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "8px 12px", borderRadius: 9,
      background: isAbsent ? "#F9FAFB" : C.bg,
      border: `1.5px solid ${mark !== "none" ? active.border : C.border}`,
      opacity: isAbsent ? .65 : 1,
      transition: "border-color .15s, opacity .15s",
    }}>
      <span style={{
        fontSize: 14, fontWeight: 600,
        color: mark !== "none" ? active.col : C.text,
        textDecoration: isAbsent ? "line-through" : "none",
      }}>
        {name}
      </span>
      <div style={{ display: "flex", gap: 5 }}>
        {[
          { type: "positive", icon: "✓",  title: "Positive" },
          { type: "negative", icon: "✗",  title: "Concern"  },
          { type: "flag",     icon: "🚩", title: "Flag"     },
          { type: "absent",   icon: "○",  title: "Absent"   },
        ].map(({ type, icon, title }) => {
          const isActive = mark === type;
          const mc = cfg[type];
          return (
            <button key={type} title={title} onClick={() => toggle(type)} style={{
              width: 32, height: 32, borderRadius: 7,
              fontSize: type === "absent" ? 16 : 14, fontWeight: 700,
              border: `1.5px solid ${isActive ? mc.border : C.border}`,
              background: isActive ? mc.bg : C.surface,
              color: isActive ? mc.col : C.muted, cursor: "pointer", transition: "all .12s",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
              onMouseEnter={e => { if (!isActive) { e.currentTarget.style.borderColor = mc.border; e.currentTarget.style.color = mc.col; }}}
              onMouseLeave={e => { if (!isActive) { e.currentTarget.style.borderColor = C.border;  e.currentTarget.style.color = C.muted; }}}
            >{icon}</button>
          );
        })}
      </div>
    </div>
  );
}

// ── Report Modal ──────────────────────────────────────────────────────────────
function ReportModal({ slot, existing, onSave, onClose }) {
  const [mood,        setMood]        = useState(existing?.mood        || MOODS[1]);
  const [engagement,  setEngagement]  = useState(existing?.engagement  || ENGAGEMENT[1]);
  const [performance, setPerformance] = useState(existing?.performance || PERFORMANCE[1]);
  const [note,        setNote]        = useState(existing?.note        || "");
  const [marks,       setMarks]       = useState(existing?.marks       || {});
  const [saving,      setSaving]      = useState(false);

  const setMark = (name, m) => setMarks(prev => ({ ...prev, [name]: m }));
  const getMark = (name)    => marks[name] || "none";

  const counts = {
    pos: slot.studentNames.filter(n => getMark(n) === "positive").length,
    neg: slot.studentNames.filter(n => getMark(n) === "negative").length,
    fl:  slot.studentNames.filter(n => getMark(n) === "flag").length,
    abs: slot.studentNames.filter(n => getMark(n) === "absent").length,
  };

  const handleSave = async () => {
    setSaving(true);
    await onSave({ mood, engagement, performance, note, marks, savedAt: new Date().toISOString() });
    setSaving(false);
    onClose();
  };

  return (
    <div className="fade-in" style={{
      position:"fixed", inset:0, background:"rgba(30,58,47,.45)",
      display:"flex", alignItems:"center", justifyContent:"center",
      zIndex:1000, padding:16, overflowY:"auto",
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="slide-up" style={{
        background:C.surface, border:`1.5px solid ${C.border}`,
        borderRadius:16, width:"100%", maxWidth:520,
        maxHeight:"92vh", overflowY:"auto", padding:26,
        boxShadow:"0 20px 60px rgba(0,0,0,.15)",
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
          <div>
            <p style={{ fontFamily:MONO, fontSize:11, color:C.amber, letterSpacing:2, marginBottom:4, fontWeight:600 }}>{slot.time}</p>
            <h2 style={{ fontFamily:SERIF, fontSize:22, color:C.forest }}>{slot.className || "Unnamed Class"}</h2>
            <p style={{ fontSize:13, color:C.textDim, marginTop:3 }}>{slot.studentNames.length} student{slot.studentNames.length !== 1 ? "s" : ""}</p>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, fontSize:24, cursor:"pointer", padding:4, lineHeight:1 }}>×</button>
        </div>

        <div style={{ background:C.bg, borderRadius:12, padding:16, marginBottom:20, display:"grid", gap:14, border:`1px solid ${C.border}` }}>
          <p style={{ fontFamily:MONO, fontSize:10, color:C.amber, letterSpacing:2, textTransform:"uppercase", fontWeight:600 }}>Class Rating</p>
          <LightSelect label="1. General class mood / attitude"  value={mood}        onChange={setMood}        options={MOODS}       />
          <LightSelect label="2. How engaged were the students?" value={engagement}  onChange={setEngagement}  options={ENGAGEMENT}  />
          <LightSelect label="3. Performance vs lesson goals"    value={performance} onChange={setPerformance} options={PERFORMANCE} />
        </div>

        {slot.studentNames.length > 0 && (
          <div style={{ marginBottom:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <FieldLabel>Student marks</FieldLabel>
              <div style={{ display:"flex", gap:10, fontSize:12 }}>
                {counts.pos > 0 && <span style={{ color:C.green, fontWeight:700 }}>✓ {counts.pos}</span>}
                {counts.neg > 0 && <span style={{ color:C.coral, fontWeight:700 }}>✗ {counts.neg}</span>}
                {counts.fl  > 0 && <span style={{ color:C.amber, fontWeight:700 }}>🚩 {counts.fl}</span>}
                {counts.abs > 0 && <span style={{ color:C.muted, fontWeight:700 }}>○ {counts.abs} absent</span>}
              </div>
            </div>
            <p style={{ fontSize:12, color:C.muted, marginBottom:10 }}>Only mark students worth noting. Unmarked = fine.</p>
            <div style={{ display:"grid", gap:6 }}>
              {slot.studentNames.map(name => (
                <StudentMark key={name} name={name} mark={getMark(name)} onChange={m => setMark(name, m)} />
              ))}
            </div>
          </div>
        )}

        <div style={{ marginBottom:20 }}>
          <FieldLabel hint="optional">Teacher note</FieldLabel>
          <textarea value={note} onChange={e => setNote(e.target.value)} rows={2}
            placeholder="Anything else worth recording..."
            style={{ width:"100%", background:C.bg, border:`1.5px solid ${C.border}`, borderRadius:8,
              padding:"9px 12px", fontSize:13, color:C.text, outline:"none", lineHeight:1.6 }}
            onFocus={e => e.target.style.borderColor = C.forest}
            onBlur={e => e.target.style.borderColor = C.border} />
        </div>

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end", alignItems:"center" }}>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" onClick={handleSave} disabled={saving}>
            {saving ? "Saving…" : "Save Report"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ── Class types (for analytics grouping) ─────────────────────────────────────
const CLASS_TYPES = ["Kids Class", "KPT", "Mini Kids / Playgroup B", "EWS", "Other"];

// ── Analytics helpers ─────────────────────────────────────────────────────────

// Parse "YYYY-MM-DD_slotId" → { date, slotId }
function parseReportId(id) {
  const match = id.match(/^(\d{4}-\d{2}-\d{2})_(.+)$/);
  if (!match) return null;
  return { date: match[1], slotId: match[2] };
}

// Given raw report rows and templates, build enriched records
function buildAnalyticsRecords(rows, weekTemplates) {
  const records = [];
  rows.forEach(row => {
    const parsed = parseReportId(row.id);
    if (!parsed) return;
    const { date, slotId } = parsed;
    const dow = DAYS[new Date(date + "T12:00:00").getDay()];
    const daySlots = weekTemplates?.[dow] || [];
    const slot = daySlots.find(s => s.id === slotId);
    if (!slot || !slot.className) return;
    records.push({
      date, slotId, dow,
      className:   slot.className,
      room:        slot.room,
      time:        slot.time,
      classType:   slot.classType || "Other",
      level:       slot.level     || "—",
      studentNames: slot.studentNames || [],
      report:      row.data,
      savedAt:     row.saved_at,
    });
  });
  return records;
}

// Aggregate mood/engagement/performance counts from records
function aggregateCounts(records, field, options) {
  const counts = {};
  options.forEach(o => counts[o] = 0);
  records.forEach(r => {
    const val = r.report?.[field];
    if (val && counts[val] !== undefined) counts[val]++;
  });
  return counts;
}

// Per-student stats across records
function buildStudentProfiles(records) {
  const profiles = {};
  records.forEach(rec => {
    const marks = rec.report?.marks || {};
    rec.studentNames.forEach(name => {
      if (!profiles[name]) {
        profiles[name] = { name, classes: 0, positive: 0, negative: 0, flag: 0, absent: 0, classNames: new Set() };
      }
      const p = profiles[name];
      p.classes++;
      p.classNames.add(rec.className);
      const m = marks[name] || "none";
      if (m === "positive") p.positive++;
      else if (m === "negative") p.negative++;
      else if (m === "flag") p.flag++;
      else if (m === "absent") p.absent++;
    });
  });
  return Object.values(profiles).sort((a, b) => a.name.localeCompare(b.name));
}

// Date range helpers
function isoWeekRange(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return {
    from: mon.toISOString().slice(0, 10),
    to:   sun.toISOString().slice(0, 10),
    label: offset === 0 ? "This Week" : offset === -1 ? "Last Week" : `${Math.abs(offset)}w ago`,
  };
}

function monthRange(offset = 0) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + offset;
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  return {
    from:  first.toISOString().slice(0, 10),
    to:    last.toISOString().slice(0, 10),
    label: first.toLocaleDateString("en-GB", { month: "long", year: "numeric" }),
  };
}

// ── SVG Pie Chart ─────────────────────────────────────────────────────────────
function PieChart({ data, size = 140 }) {
  // data: [{ label, value, color }]
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return (
    <div style={{ width: size, height: size, borderRadius: "50%",
      background: C.border, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <span style={{ fontSize: 11, color: C.muted }}>No data</span>
    </div>
  );

  let cumAngle = -90; // start at top
  const slices = data.map(d => {
    const pct   = d.value / total;
    const angle = pct * 360;
    const start = cumAngle;
    cumAngle += angle;
    return { ...d, pct, startAngle: start, endAngle: cumAngle };
  });

  const toXY = (angle, r) => {
    const rad = (angle * Math.PI) / 180;
    return { x: 50 + r * Math.cos(rad), y: 50 + r * Math.sin(rad) };
  };

  const r = 40;
  const cx = 50, cy = 50;

  return (
    <svg viewBox="0 0 100 100" width={size} height={size} style={{ overflow: "visible" }}>
      {slices.map((s, i) => {
        if (s.value === 0) return null;
        const start = toXY(s.startAngle, r);
        const end   = toXY(s.endAngle,   r);
        const large = (s.endAngle - s.startAngle) > 180 ? 1 : 0;
        // If 100%, draw circle
        if (s.pct >= 0.9999) {
          return <circle key={i} cx={cx} cy={cy} r={r} fill={s.color} />;
        }
        return (
          <path key={i}
            d={`M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${large} 1 ${end.x} ${end.y} Z`}
            fill={s.color} stroke={C.white} strokeWidth="1"
          />
        );
      })}
      {/* Centre hole */}
      <circle cx={cx} cy={cy} r={22} fill={C.surface} />
      <text x={cx} y={cy - 4} textAnchor="middle" fontSize="10" fontWeight="700" fill={C.text}>{total}</text>
      <text x={cx} y={cy + 8} textAnchor="middle" fontSize="7" fill={C.muted}>classes</text>
    </svg>
  );
}

// ── Pie Legend ────────────────────────────────────────────────────────────────
function PieLegend({ data, total }) {
  return (
    <div style={{ display: "grid", gap: 5 }}>
      {data.filter(d => d.value > 0).map(d => (
        <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 10, height: 10, borderRadius: 3, background: d.color, flexShrink: 0 }} />
          <span style={{ fontSize: 12, color: C.textDim, flex: 1 }}>{d.label.replace(/^.+?\s/, "")}</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: C.text, fontFamily: MONO }}>{d.value}</span>
          <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO, minWidth: 36, textAlign: "right" }}>
            {total > 0 ? Math.round(d.value / total * 100) + "%" : "—"}
          </span>
        </div>
      ))}
    </div>
  );
}

// ── Metric Card with Pie ──────────────────────────────────────────────────────
function MetricPie({ title, data }) {

}

// ── Student Profile Card ──────────────────────────────────────────────────────
function StudentProfileCard({ profile }) {
  const attended = profile.classes - profile.absent;
  const attPct   = profile.classes > 0 ? Math.round(attended / profile.classes * 100) : 0;
  const posPct   = attended > 0 ? Math.round(profile.positive / attended * 100) : 0;

  const barColor = posPct >= 60 ? C.green : posPct >= 30 ? C.amber : C.coral;

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10,
      padding: "14px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div>
          <p style={{ fontWeight: 700, fontSize: 15, color: C.forest }}>{profile.name}</p>
          <p style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
            {[...profile.classNames].join(", ")}
          </p>
        </div>
        <div style={{ textAlign: "right" }}>
          <p style={{ fontFamily: MONO, fontSize: 18, fontWeight: 700, color: C.forest }}>{attPct}%</p>
          <p style={{ fontSize: 10, color: C.muted }}>attendance</p>
        </div>
      </div>

      {/* Positive rate bar */}
      <div style={{ marginBottom: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ fontSize: 11, color: C.textDim }}>Positive rate</span>
          <span style={{ fontSize: 11, fontWeight: 700, color: barColor, fontFamily: MONO }}>{posPct}%</span>
        </div>
        <div style={{ height: 6, background: C.border, borderRadius: 99, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${posPct}%`, background: barColor,
            borderRadius: 99, transition: "width .4s ease" }} />
        </div>
      </div>

      {/* Mark counts */}
      <div style={{ display: "flex", gap: 8, fontSize: 11 }}>
        {[
          { icon: "✓", val: profile.positive, col: C.green  },
          { icon: "✗", val: profile.negative, col: C.coral  },
          { icon: "🚩",val: profile.flag,     col: C.amber  },
          { icon: "○", val: profile.absent,   col: C.muted  },
        ].map(({ icon, val, col }) => (
          <span key={icon} style={{ color: col, fontWeight: 700, fontFamily: MONO }}>
            {icon} {val}
          </span>
        ))}
        <span style={{ color: C.muted, marginLeft: "auto" }}>{profile.classes} logged</span>
      </div>
    </div>
  );
}

// ── Analytics View ────────────────────────────────────────────────────────────
function AnalyticsView({ weekTemplates, onClose }) {
  const [loading,     setLoading]     = useState(true);
  const [records,     setRecords]     = useState([]);
  const [rangeMode,   setRangeMode]   = useState("week"); // week | month
  const [rangeOffset, setRangeOffset] = useState(0);
  const [filterType,  setFilterType]  = useState("All");
  const [filterClass, setFilterClass] = useState("All");
  const [activeTab,   setActiveTab]   = useState("overview"); // overview | classes | students
  const [searchName,  setSearchName]  = useState("");

  const range = rangeMode === "week" ? isoWeekRange(rangeOffset) : monthRange(rangeOffset);

  useEffect(() => {
    setLoading(true);
    loadReportsInRange(range.from, range.to).then(rows => {
      setRecords(buildAnalyticsRecords(rows, weekTemplates));
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [range.from, range.to]);

  // Filter records
  const filtered = records.filter(r => {
    if (filterType  !== "All" && r.classType  !== filterType)  return false;
    if (filterClass !== "All" && r.className  !== filterClass) return false;
    return true;
  });

  const allClassNames = [...new Set(records.map(r => r.className))].sort();

  // Pie data builders
  const moodData = [
    { label: MOODS[0], value: aggregateCounts(filtered, "mood", MOODS)[MOODS[0]], color: "#059669" },
    { label: MOODS[1], value: aggregateCounts(filtered, "mood", MOODS)[MOODS[1]], color: "#34D399" },
    { label: MOODS[2], value: aggregateCounts(filtered, "mood", MOODS)[MOODS[2]], color: "#FCD34D" },
    { label: MOODS[3], value: aggregateCounts(filtered, "mood", MOODS)[MOODS[3]], color: "#F97316" },
    { label: MOODS[4], value: aggregateCounts(filtered, "mood", MOODS)[MOODS[4]], color: "#EF4444" },
  ];
  const engData = [
    { label: ENGAGEMENT[0], value: aggregateCounts(filtered, "engagement", ENGAGEMENT)[ENGAGEMENT[0]], color: "#059669" },
    { label: ENGAGEMENT[1], value: aggregateCounts(filtered, "engagement", ENGAGEMENT)[ENGAGEMENT[1]], color: "#34D399" },
    { label: ENGAGEMENT[2], value: aggregateCounts(filtered, "engagement", ENGAGEMENT)[ENGAGEMENT[2]], color: "#FCD34D" },
    { label: ENGAGEMENT[3], value: aggregateCounts(filtered, "engagement", ENGAGEMENT)[ENGAGEMENT[3]], color: "#F97316" },
    { label: ENGAGEMENT[4], value: aggregateCounts(filtered, "engagement", ENGAGEMENT)[ENGAGEMENT[4]], color: "#EF4444" },
  ];
  const perfData = [
    { label: PERFORMANCE[0], value: aggregateCounts(filtered, "performance", PERFORMANCE)[PERFORMANCE[0]], color: "#059669" },
    { label: PERFORMANCE[1], value: aggregateCounts(filtered, "performance", PERFORMANCE)[PERFORMANCE[1]], color: "#34D399" },
    { label: PERFORMANCE[2], value: aggregateCounts(filtered, "performance", PERFORMANCE)[PERFORMANCE[2]], color: "#FCD34D" },
    { label: PERFORMANCE[3], value: aggregateCounts(filtered, "performance", PERFORMANCE)[PERFORMANCE[3]], color: "#F97316" },
    { label: PERFORMANCE[4], value: aggregateCounts(filtered, "performance", PERFORMANCE)[PERFORMANCE[4]], color: "#6B7280" },
  ];

  // Per-class breakdown
  const classBreakdown = allClassNames.map(cn => {
    const recs = filtered.filter(r => r.className === cn);
    const allMarks = recs.flatMap(r => Object.values(r.report?.marks || {}));
    const pos = allMarks.filter(m => m === "positive").length;
    const neg = allMarks.filter(m => m === "negative").length;
    const fl  = allMarks.filter(m => m === "flag").length;
    const abs = allMarks.filter(m => m === "absent").length;
    const total = allMarks.length;
    return { className: cn, classType: recs[0]?.classType || "Other",
      count: recs.length, pos, neg, fl, abs, total };
  }).filter(c => c.count > 0);

  // Student profiles
  const students = buildStudentProfiles(filtered);
  const filteredStudents = searchName
    ? students.filter(s => s.name.toLowerCase().includes(searchName.toLowerCase()))
    : students;

  const Tab = ({ id, label }) => (
    <button onClick={() => setActiveTab(id)} style={{
      padding: "7px 16px", borderRadius: 8, border: "none",
      background: activeTab === id ? C.forest : "transparent",
      color: activeTab === id ? C.white : C.textDim,
      fontWeight: 700, fontSize: 13, cursor: "pointer", transition: "all .15s",
    }}>{label}</button>
  );

  return (
    <div className="fade-in" style={{
      position: "fixed", inset: 0, background: C.bg, zIndex: 2000,
      overflowY: "auto",
    }}>
      <div style={{ maxWidth: 960, margin: "0 auto", padding: "24px 16px 56px" }}>

        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start",
          marginBottom: 24, paddingBottom: 20, borderBottom: `1.5px solid ${C.border}` }}>
          <div>
            <p style={{ fontFamily: MONO, fontSize: 10, color: C.purple, letterSpacing: 2,
              fontWeight: 700, marginBottom: 4 }}>ANALYTICS</p>
            <h1 style={{ fontFamily: SERIF, fontSize: 26, color: C.forest }}>
              KANA <span style={{ color: C.amber, fontStyle: "italic" }}>Reports</span>
            </h1>
          </div>
          <Btn variant="ghost" small onClick={onClose}>← Back to Log</Btn>
        </div>

        {/* Range controls */}
        <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
          {/* Week / Month toggle */}
          <div style={{ display: "flex", background: C.surface, border: `1px solid ${C.border}`,
            borderRadius: 9, overflow: "hidden" }}>
            {["week","month"].map(m => (
              <button key={m} onClick={() => { setRangeMode(m); setRangeOffset(0); }} style={{
                padding: "6px 16px", border: "none", fontWeight: 700, fontSize: 13, cursor: "pointer",
                background: rangeMode === m ? C.forest : "transparent",
                color: rangeMode === m ? C.white : C.textDim, transition: "all .15s",
              }}>{m === "week" ? "Weekly" : "Monthly"}</button>
            ))}
          </div>

          {/* Prev / label / Next */}
          <button onClick={() => setRangeOffset(o => o - 1)} style={{
            background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7,
            padding: "6px 12px", cursor: "pointer", fontSize: 16, color: C.text }}>‹</button>
          <span style={{ fontFamily: SERIF, fontSize: 16, color: C.forest, minWidth: 160, textAlign: "center" }}>
            {range.label}
          </span>
          <button onClick={() => setRangeOffset(o => Math.min(o + 1, 0))} style={{
            background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7,
            padding: "6px 12px", cursor: "pointer", fontSize: 16, color: C.text,
            opacity: rangeOffset >= 0 ? .4 : 1 }} disabled={rangeOffset >= 0}>›</button>

          {/* Filters */}
          <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{
            background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7,
            padding: "6px 10px", fontSize: 13, color: C.text, cursor: "pointer" }}>
            <option value="All">All class types</option>
            {CLASS_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>

          <select value={filterClass} onChange={e => setFilterClass(e.target.value)} style={{
            background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7,
            padding: "6px 10px", fontSize: 13, color: C.text, cursor: "pointer" }}>
            <option value="All">All classes</option>
            {allClassNames.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        {/* Summary stats */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))",
          gap: 10, marginBottom: 24 }}>
          {[
            { label: "Classes logged", value: filtered.length, col: C.forest },
            { label: "Total students", value: [...new Set(filtered.flatMap(r => r.studentNames))].length, col: C.purple },
            { label: "Absences",       value: filtered.flatMap(r => Object.values(r.report?.marks || {})).filter(m => m === "absent").length, col: C.coral },
            { label: "Positive marks", value: filtered.flatMap(r => Object.values(r.report?.marks || {})).filter(m => m === "positive").length, col: C.green },
            { label: "Flags",          value: filtered.flatMap(r => Object.values(r.report?.marks || {})).filter(m => m === "flag").length, col: C.amber },
          ].map(s => (
            <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`,
              borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
              <p style={{ fontFamily: SERIF, fontSize: 24, fontWeight: 700, color: s.col }}>{s.value}</p>
              <p style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{s.label}</p>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 20, background: C.surface,
          padding: 5, borderRadius: 10, border: `1px solid ${C.border}`, width: "fit-content" }}>
          <Tab id="overview"  label="Overview"  />
          <Tab id="classes"   label="By Class"  />
          <Tab id="students"  label="Students"  />
        </div>

        {loading ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: 60, gap: 12 }}>
            <div className="spin" style={{ width: 28, height: 28, border: `3px solid ${C.border}`,
              borderTopColor: C.forest, borderRadius: "50%" }} />
            <span style={{ fontFamily: MONO, fontSize: 13, color: C.muted }}>Loading data…</span>
          </div>
        ) : filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: 60 }}>
            <p style={{ fontFamily: SERIF, fontSize: 20, color: C.muted, marginBottom: 8 }}>No data yet</p>
            <p style={{ fontSize: 13, color: C.muted }}>Log some classes to see analytics here.</p>
          </div>
        ) : (
          <>
            {/* ── OVERVIEW TAB ── */}
            {activeTab === "overview" && (
              <div style={{ display: "grid", gap: 16 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
                  <MetricPie title="Class Mood" data={moodData} />
                  <MetricPie title="Student Engagement" data={engData} />
                  <MetricPie title="Lesson Performance" data={perfData} />
                </div>
              </div>
            )}

            {/* ── BY CLASS TAB ── */}
            {activeTab === "classes" && (
              <div style={{ display: "grid", gap: 12 }}>
                {classBreakdown.map(c => {
                  const classRecs = filtered.filter(r => r.className === c.className);
                  const cMood = [
                    { label: MOODS[0], value: aggregateCounts(classRecs, "mood", MOODS)[MOODS[0]], color: "#059669" },
                    { label: MOODS[1], value: aggregateCounts(classRecs, "mood", MOODS)[MOODS[1]], color: "#34D399" },
                    { label: MOODS[2], value: aggregateCounts(classRecs, "mood", MOODS)[MOODS[2]], color: "#FCD34D" },
                    { label: MOODS[3], value: aggregateCounts(classRecs, "mood", MOODS)[MOODS[3]], color: "#F97316" },
                    { label: MOODS[4], value: aggregateCounts(classRecs, "mood", MOODS)[MOODS[4]], color: "#EF4444" },
                  ];
                  const cEng = [
                    { label: ENGAGEMENT[0], value: aggregateCounts(classRecs, "engagement", ENGAGEMENT)[ENGAGEMENT[0]], color: "#059669" },
                    { label: ENGAGEMENT[1], value: aggregateCounts(classRecs, "engagement", ENGAGEMENT)[ENGAGEMENT[1]], color: "#34D399" },
                    { label: ENGAGEMENT[2], value: aggregateCounts(classRecs, "engagement", ENGAGEMENT)[ENGAGEMENT[2]], color: "#FCD34D" },
                    { label: ENGAGEMENT[3], value: aggregateCounts(classRecs, "engagement", ENGAGEMENT)[ENGAGEMENT[3]], color: "#F97316" },
                    { label: ENGAGEMENT[4], value: aggregateCounts(classRecs, "engagement", ENGAGEMENT)[ENGAGEMENT[4]], color: "#EF4444" },
                  ];
                  const cPerf = [
                    { label: PERFORMANCE[0], value: aggregateCounts(classRecs, "performance", PERFORMANCE)[PERFORMANCE[0]], color: "#059669" },
                    { label: PERFORMANCE[1], value: aggregateCounts(classRecs, "performance", PERFORMANCE)[PERFORMANCE[1]], color: "#34D399" },
                    { label: PERFORMANCE[2], value: aggregateCounts(classRecs, "performance", PERFORMANCE)[PERFORMANCE[2]], color: "#FCD34D" },
                    { label: PERFORMANCE[3], value: aggregateCounts(classRecs, "performance", PERFORMANCE)[PERFORMANCE[3]], color: "#F97316" },
                    { label: PERFORMANCE[4], value: aggregateCounts(classRecs, "performance", PERFORMANCE)[PERFORMANCE[4]], color: "#6B7280" },
                  ];
                  const posPct = c.total > 0 ? Math.round(c.pos / c.total * 100) : 0;
                  return (
                    <div key={c.className} style={{ background: C.surface, border: `1px solid ${C.border}`,
                      borderRadius: 12, padding: 20, borderLeft: `4px solid ${C.amber}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                        <div>
                          <h3 style={{ fontFamily: SERIF, fontSize: 18, color: C.forest }}>{c.className}</h3>
                          <p style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>
                            {c.count} session{c.count !== 1 ? "s" : ""} logged · {c.classType}
                          </p>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <p style={{ fontFamily: MONO, fontSize: 20, fontWeight: 700,
                            color: posPct >= 60 ? C.green : posPct >= 30 ? C.amber : C.coral }}>
                            {posPct}%
                          </p>
                          <p style={{ fontSize: 10, color: C.muted }}>positive marks</p>
                        </div>
                      </div>
                      {/* Student mark summary */}
                      <div style={{ display: "flex", gap: 12, marginBottom: 16, fontSize: 12 }}>
                        <span style={{ color: C.green,  fontWeight: 700 }}>✓ {c.pos}</span>
                        <span style={{ color: C.coral,  fontWeight: 700 }}>✗ {c.neg}</span>
                        <span style={{ color: C.amber,  fontWeight: 700 }}>🚩 {c.fl}</span>
                        <span style={{ color: C.muted,  fontWeight: 700 }}>○ {c.abs} absent</span>
                      </div>
                      {/* 3 mini pies */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                        {[
                          { title: "Mood", data: cMood },
                          { title: "Engagement", data: cEng },
                          { title: "Performance", data: cPerf },
                        ].map(({ title, data }) => (
                          <div key={title}>
                            <p style={{ fontSize: 11, fontWeight: 700, color: C.muted,
                              textTransform: "uppercase", letterSpacing: .8, marginBottom: 8 }}>{title}</p>
                            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                              <PieChart data={data} size={80} />
                              <div style={{ display: "grid", gap: 3 }}>
                                {data.filter(d => d.value > 0).map(d => {
                                  const t = data.reduce((s, x) => s + x.value, 0);
                                  return (
                                    <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                                      <div style={{ width: 7, height: 7, borderRadius: 2, background: d.color }} />
                                      <span style={{ fontSize: 10, color: C.muted }}>
                                        {t > 0 ? Math.round(d.value / t * 100) : 0}%
                                      </span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── STUDENTS TAB ── */}
            {activeTab === "students" && (
              <div>
                <div style={{ marginBottom: 16 }}>
                  <input value={searchName} onChange={e => setSearchName(e.target.value)}
                    placeholder="Search student name…"
                    style={{ width: "100%", maxWidth: 300, background: C.surface,
                      border: `1.5px solid ${C.border}`, borderRadius: 8,
                      padding: "8px 12px", fontSize: 14, color: C.text, outline: "none" }}
                    onFocus={e => e.target.style.borderColor = C.forest}
                    onBlur={e => e.target.style.borderColor = C.border} />
                  <span style={{ fontSize: 12, color: C.muted, marginLeft: 12 }}>
                    {filteredStudents.length} student{filteredStudents.length !== 1 ? "s" : ""}
                  </span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
                  {filteredStudents.map(p => <StudentProfileCard key={p.name} profile={p} />)}
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [weekTemplates, setWeekTemplates] = useState(null);
  const [dayReports,    setDayReports]    = useState({});
  const [date,          setDate]          = useState(todayStr());
  const [reportSlot,    setReportSlot]    = useState(null);
  const [showTemplate,  setShowTemplate]  = useState(false);
  const [showAnalytics, setShowAnalytics] = useState(false);
  const [appStatus,     setAppStatus]     = useState("loading");
  const [syncStatus,    setSyncStatus]    = useState(null);
  const [liveTime,      setLiveTime]      = useState(nowHHMM());

  // Live clock — ticks every 30 seconds
  useEffect(() => {
    const t = setInterval(() => setLiveTime(nowHHMM()), 30000);
    return () => clearInterval(t);
  }, []);

  // ── Initial load ────────────────────────────────────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        const raw = await loadTemplates();
        setWeekTemplates(migrateTemplates(raw));
        setAppStatus("ready");
      } catch (e) {
        console.error("Failed to load templates:", e);
        setWeekTemplates(buildWeekTemplates());
        setAppStatus("error");
      }
    })();
  }, []);

  // ── Reload reports when date changes ────────────────────────────────────────
  useEffect(() => {
    if (appStatus !== "ready" && appStatus !== "error") return;
    (async () => {
      try {
        const reports = await loadReportsForDate(date);
        setDayReports(reports);
      } catch (e) {
        console.error("Failed to load reports:", e);
        setDayReports({});
      }
    })();
  }, [date, appStatus]);

  // ── Save report ─────────────────────────────────────────────────────────────
  const handleSaveReport = async (slot, report) => {
    setSyncStatus("saving");
    try {
      await saveReport(date, slot.id, report);
      setDayReports(prev => ({ ...prev, [slot.id]: report }));
      setSyncStatus("saved");
      setTimeout(() => setSyncStatus(null), 2500);
    } catch (e) {
      console.error("Failed to save report:", e);
      setSyncStatus("error");
      setTimeout(() => setSyncStatus(null), 4000);
    }
  };

  // ── Save templates ──────────────────────────────────────────────────────────
  const handleSaveTemplates = async (templates) => {
    setSyncStatus("saving");
    try {
      await saveTemplates(templates);
      setWeekTemplates(templates);
      setSyncStatus("saved");
      setTimeout(() => setSyncStatus(null), 2500);
    } catch (e) {
      console.error("Failed to save templates:", e);
      setSyncStatus("error");
      setTimeout(() => setSyncStatus(null), 4000);
    }
  };

  // ── Loading screen ──────────────────────────────────────────────────────────
  if (appStatus === "loading") {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        height:"100vh", background:C.bg, gap:16 }}>
        <style>{css}</style>
        <div className="spin" style={{ width:32, height:32, border:`3px solid ${C.border}`,
          borderTopColor:C.forest, borderRadius:"50%" }} />
        <p style={{ fontFamily:MONO, fontSize:13, color:C.muted, letterSpacing:1 }}>Loading from cloud…</p>
      </div>
    );
  }

  const dow   = dayName(date);
  const slots = (weekTemplates || buildWeekTemplates())[dow] || buildTemplate(dow);
  const isToday = date === todayStr();
  const currentSlots = isToday ? getCurrentSlots(slots) : [];

  return (
    <>
      <style>{css}</style>

      {reportSlot && (
        <ReportModal
          slot={reportSlot}
          existing={dayReports[reportSlot.id]}
          onSave={r => handleSaveReport(reportSlot, r)}
          onClose={() => setReportSlot(null)}
        />
      )}

      {showTemplate && (
        <TemplateBuilder
          weekTemplates={weekTemplates || buildWeekTemplates()}
          onSave={handleSaveTemplates}
          onClose={() => setShowTemplate(false)}
        />
      )}

      {showAnalytics && (
        <AnalyticsView
          weekTemplates={weekTemplates || buildWeekTemplates()}
          onClose={() => setShowAnalytics(false)}
        />
      )}

      <div style={{ maxWidth:940, margin:"0 auto", padding:"28px 16px 56px", minHeight:"100vh" }}>

        {/* HEADER */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          marginBottom:26, flexWrap:"wrap", gap:12,
          paddingBottom:20, borderBottom:`1.5px solid ${C.border}` }}>
          <div>
            <h1 style={{ fontFamily:SERIF, fontSize:28, color:C.forest }}>
              KANA <span style={{ color:C.amber, fontStyle:"italic" }}>Daily Log</span>
            </h1>
            {appStatus === "error" && (
              <p style={{ fontSize:11, color:C.coral, marginTop:4, fontFamily:MONO }}>
                ⚠ Could not connect to cloud — check your connection
              </p>
            )}
          </div>
          <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            {syncStatus && <SyncBadge status={syncStatus} />}
            <DayStats slots={slots} dayReports={dayReports} />
            <Btn variant="purple" small onClick={() => setShowTemplate(true)}>
              ⚙ Weekly Schedule
            </Btn>
            <Btn variant="green" small onClick={() => setShowAnalytics(true)}>
              📊 Reports
            </Btn>
          </div>
        </div>

        {/* DATE NAV */}
        <div style={{ marginBottom:22 }}>
          <DateNav date={date} onChange={setDate} />
        </div>

        {/* ── CURRENT CLASS BANNER ── shows only today during active lesson hours */}
        {currentSlots.length > 0 && (
          <div style={{
            marginBottom:20, borderRadius:12, overflow:"hidden",
            border:`2px solid ${C.forest}`,
            boxShadow:"0 4px 20px rgba(30,58,47,.12)",
          }}>
            <div style={{
              background:C.forest, padding:"10px 18px",
              display:"flex", justifyContent:"space-between", alignItems:"center",
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{
                  width:8, height:8, borderRadius:"50%", background:C.green,
                  boxShadow:`0 0 0 3px rgba(13,122,71,.3)`,
                  animation:"pulse 2s ease infinite",
                }} />
                <span style={{ fontFamily:MONO, fontSize:11, color:C.amberBg, letterSpacing:2, fontWeight:700 }}>
                  NOW LIVE
                </span>
              </div>
              <span style={{ fontFamily:MONO, fontSize:13, color:C.amberBg, fontWeight:600 }}>
                {liveTime}
              </span>
            </div>
            <div style={{
              background:"#F0F7F3", padding:"12px 18px",
              display:"flex", gap:10, flexWrap:"wrap",
            }}>
              {currentSlots.map(slot => (
                <button key={slot.id} onClick={() => setReportSlot(slot)} style={{
                  flex:1, minWidth:180, padding:"10px 16px", borderRadius:9,
                  background: dayReports[slot.id] ? C.greenBg : C.white,
                  border:`1.5px solid ${dayReports[slot.id] ? C.green : C.forest}`,
                  cursor:"pointer", textAlign:"left", transition:"all .15s",
                }}
                  onMouseEnter={e => e.currentTarget.style.background = dayReports[slot.id] ? C.greenBg : "#F8F6F1"}
                  onMouseLeave={e => e.currentTarget.style.background = dayReports[slot.id] ? C.greenBg : C.white}
                >
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                    <span style={{ fontWeight:700, fontSize:14, color:C.forest }}>{slot.className}</span>
                    {slot.room && (
                      <span style={{ fontFamily:MONO, fontSize:10, fontWeight:700,
                        color: slot.room === "Room A" ? C.purple : C.forestMid,
                        background: slot.room === "Room A" ? C.purpleBg : C.greenDim,
                        padding:"1px 7px", borderRadius:99 }}>
                        {slot.room}
                      </span>
                    )}
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:12, color:C.textDim }}>
                      {slot.studentNames.length} student{slot.studentNames.length !== 1 ? "s" : ""}
                    </span>
                    <span style={{ fontSize:12, fontWeight:700,
                      color: dayReports[slot.id] ? C.green : C.forest }}>
                      {dayReports[slot.id] ? "✓ Logged — tap to edit" : "Tap to log →"}
                    </span>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* No active class right now but is today */}
        {isToday && currentSlots.length === 0 && slots.filter(s => s.className).length > 0 && (() => {
          const times = [...new Set(slots.map(s => s.time))].sort();
          const now = nowHHMM();
          const next = times.find(t => t > now);
          if (!next) return null;
          const nextSlots = slots.filter(s => s.time === next && s.className);
          if (!nextSlots.length) return null;
          return (
            <div style={{
              marginBottom:20, borderRadius:10, padding:"10px 16px",
              background:C.amberBg, border:`1.5px solid ${C.amber}`,
              display:"flex", alignItems:"center", gap:10,
            }}>
              <span style={{ fontSize:13, color:C.amber, fontFamily:MONO, fontWeight:600 }}>
                ⏱ Next class at {next}
              </span>
              <span style={{ fontSize:13, color:C.textDim }}>
                — {nextSlots.map(s => s.className + (s.room ? ` (${s.room})` : "")).join(" · ")}
              </span>
            </div>
          );
        })()}

        {/* DAY LABEL */}
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:18 }}>
          <p style={{ fontFamily:MONO, fontSize:11, color:C.purple, letterSpacing:2, textTransform:"uppercase", fontWeight:600 }}>
            {dow} Schedule
          </p>
          {dow === "Saturday" && (
            <span style={{ fontSize:11, color:C.amber, fontWeight:600, fontFamily:MONO }}>09:00 – 17:00</span>
          )}
          <button onClick={() => setShowTemplate(true)} style={{
            background:"none", border:`1px solid ${C.border}`, borderRadius:6,
            padding:"3px 10px", color:C.textDim, fontSize:11, cursor:"pointer",
          }}>Edit {dow}</button>
        </div>

        {/* SLOT GRID */}
        {isDualDay(dow) ? (() => {
          const times = slotTimesFor(dow);
          return (
            <div style={{ display:"grid", gap:14 }}>
              {times.map(time => {
                const pair = slots.filter(s => s.time === time);
                const isCurrent = isToday && currentSlots.some(s => s.time === time);
                return (
                  <div key={time}>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                      {pair.map(slot => (
                        <SlotCard key={slot.id} slot={slot} report={dayReports[slot.id]}
                          isCurrent={isToday && currentSlots.some(s => s.id === slot.id)}
                          onLog={() => setReportSlot(slot)}
                          onEditTemplate={() => setShowTemplate(true)} />
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })() : (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(270px, 1fr))", gap:14 }}>
            {slots.map(slot => (
              <SlotCard key={slot.id} slot={slot} report={dayReports[slot.id]}
                isCurrent={isToday && currentSlots.some(s => s.id === slot.id)}
                onLog={() => setReportSlot(slot)}
                onEditTemplate={() => setShowTemplate(true)} />
            ))}
          </div>
        )}

        <p style={{ textAlign:"center", color:C.muted, fontSize:11, marginTop:32, fontFamily:MONO, letterSpacing:.5 }}>
          Synced to cloud · Data shared across all devices
        </p>
      </div>
    </>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);

</script>
</body>
</html>
