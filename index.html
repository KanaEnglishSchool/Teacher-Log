        <Btn variant="ghost" small onClick={() => setAdding(!adding)}>{adding ? "Cancel" : "+ Add"}</Btn>
      </div>

      {adding && (
        <div style={{ background: C.bg, borderRadius: 10, padding: 14, marginBottom: 14, display: "grid", gap: 12 }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {COMMENT_TYPES.map(t => (
              <button key={t.id} onClick={() => setType(t.id)} style={{
                padding: "5px 12px", borderRadius: 99, fontSize: 12, fontWeight: 700, cursor: "pointer",
                border: `1.5px solid ${type === t.id ? t.color : C.border}`,
                background: type === t.id ? t.bg : "transparent",
                color: type === t.id ? t.color : C.muted,
              }}>{t.label}</button>
            ))}
          </div>
          <textarea value={text} onChange={e => setText(e.target.value)} rows={2}
            placeholder="What did the parent say? Or an internal note about the student…"
            style={{ width: "100%", background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 8,
              padding: "9px 12px", fontSize: 13, color: C.text, outline: "none", lineHeight: 1.6 }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <input type="date" value={cDate} onChange={e => setCDate(e.target.value)}
                style={{ background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 7, padding: "5px 9px", fontSize: 12, color: C.text, outline: "none" }} />
              <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 12, color: C.textDim }}>
                <input type="checkbox" checked={followUp} onChange={e => setFollowUp(e.target.checked)}
                  style={{ accentColor: C.coral, cursor: "pointer" }} />
                Needs follow-up
              </label>
            </div>
            <Btn variant="primary" small onClick={add} disabled={saving || !text.trim()}>
              {saving ? "Saving…" : "Save Comment"}
            </Btn>
          </div>
        </div>
      )}

      {comments.length === 0 ? (
        <p style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: "16px 0" }}>
          No comments recorded yet. Log what parents tell you — it's retention gold.
        </p>
      ) : (
        <div style={{ display: "grid", gap: 8 }}>
          {comments.map(cm => {
            const meta = COMMENT_TYPES.find(t => t.id === cm.type) || COMMENT_TYPES[3];
            return (
              <div key={cm.id} style={{
                padding: "10px 12px", background: meta.bg, borderRadius: 9,
                borderLeft: `3px solid ${meta.color}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5, gap: 8 }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, fontWeight: 800, color: meta.color }}>{meta.label}</span>
                    <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO }}>{fmtShort(cm.date)}</span>
                    {cm.followUp && (
                      <span style={{ fontSize: 10, fontWeight: 800, color: C.coral, background: C.surface, padding: "1px 8px", borderRadius: 99 }}>
                        ⚠ FOLLOW UP
                      </span>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                    <button onClick={() => toggleFollowUp(cm.id)} title={cm.followUp ? "Mark resolved" : "Mark needs follow-up"}
                      style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: cm.followUp ? C.green : C.muted }}>
                      {cm.followUp ? "✓" : "⚑"}
                    </button>
                    <button onClick={() => remove(cm.id)} title="Delete"
                      style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: C.muted }}>×</button>
                  </div>
                </div>
                <p style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>{cm.text}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Referrals Section ─────────────────────────────────────────────────────────
function ReferralsSection({ initialData, onSave }) {
  const [referrals, setReferrals] = useState(initialData?.referrals || []);
  const [adding,    setAdding]    = useState(false);
  const [saving,    setSaving]    = useState(false);
  const [refName,   setRefName]   = useState("");
  const [refDate,   setRefDate]   = useState(todayStr());

  const persist = async (next) => {
    setSaving(true);
    try { await onSave({ referrals: next }); setReferrals(next); }
    finally { setSaving(false); }
  };

  const add = async () => {
    if (!refName.trim()) return;
    await persist([{ id: Date.now(), name: refName.trim(), date: refDate, status: "mentioned" }, ...referrals]);
    setRefName(""); setAdding(false);
  };

  const setStatus = (id, status) => persist(referrals.map(r => r.id === id ? { ...r, status } : r));
  const remove    = (id) => persist(referrals.filter(r => r.id !== id));

  const joined = referrals.filter(r => r.status === "joined").length;

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div>
          <p style={{ fontFamily: MONO, fontSize: 11, color: C.purple, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>
            🔗 Referrals From This Family
          </p>
          {referrals.length > 0 && (
            <p style={{ fontSize: 12, color: C.textDim, marginTop: 3 }}>
              {referrals.length} referral{referrals.length !== 1 ? "s" : ""} · <strong style={{ color: C.green }}>{joined} joined</strong>
            </p>
          )}
        </div>
        <Btn variant="ghost" small onClick={() => setAdding(!adding)}>{adding ? "Cancel" : "+ Add"}</Btn>
      </div>

      {adding && (
        <div style={{ background: C.bg, borderRadius: 10, padding: 14, marginBottom: 14, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div style={{ flex: 1, minWidth: 160 }}>
            <LightInput label="Referred family / student" value={refName} onChange={setRefName} placeholder="e.g. Yamada family" />
          </div>
          <input type="date" value={refDate} onChange={e => setRefDate(e.target.value)}
            style={{ background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 7, padding: "8px 10px", fontSize: 13, color: C.text, outline: "none" }} />
          <Btn variant="primary" small onClick={add} disabled={saving || !refName.trim()}>
            {saving ? "Saving…" : "Save"}
          </Btn>
        </div>
      )}

      {referrals.length === 0 ? (
        <p style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: "12px 0" }}>
          No referrals tracked yet. When this family mentions a friend — log it here.
        </p>
      ) : (
        <div style={{ display: "grid", gap: 8 }}>
          {referrals.map(r => (
            <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", background: C.bg, borderRadius: 9, flexWrap: "wrap" }}>
              <span style={{ fontWeight: 600, fontSize: 13, color: C.forest, flex: 1, minWidth: 100 }}>{r.name}</span>
              <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO }}>{r.date}</span>
              <div style={{ display: "flex", gap: 4 }}>
                {REFERRAL_STATUSES.map(s => (
                  <button key={s.id} onClick={() => setStatus(r.id, s.id)} style={{
                    padding: "3px 10px", borderRadius: 99, fontSize: 11, fontWeight: 700, cursor: "pointer",
                    border: `1.5px solid ${r.status === s.id ? s.color : C.border}`,
                    background: r.status === s.id ? s.bg : "transparent",
                    color: r.status === s.id ? s.color : C.muted,
                  }}>{s.label}</button>
                ))}
              </div>
              <button onClick={() => remove(r.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: C.muted }}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Test Scores Section ───────────────────────────────────────────────────────
function TestScoresSection({ studentName, initialData, onSave }) {
  const [scores, setScores]       = useState(initialData?.testScores || []);
  const [adding, setAdding]       = useState(false);
  const [saving, setSaving]       = useState(false);
  // Form state
  const [year,   setYear]   = useState(String(CURRENT_YEAR));
  const [term,   setTerm]   = useState(SCHOOL_TERMS[0]);
  const [score,  setScore]  = useState("");
  const [maxScore, setMaxScore] = useState("100");
  const [notes,  setNotes]  = useState("");

  const addScore = async () => {
    if (!score) return;
    const newEntry = { id: Date.now(), year, term, score: Number(score), maxScore: Number(maxScore), notes, date: todayStr() };
    const updated = [...scores, newEntry].sort((a, b) =>
      `${a.year}${SCHOOL_TERMS.indexOf(a.term)}`.localeCompare(`${b.year}${SCHOOL_TERMS.indexOf(b.term)}`)
    );
    setSaving(true);
    await onSave({ testScores: updated });
    setScores(updated);
    setSaving(false);
    setAdding(false);
    setScore(""); setNotes("");
  };

  const removeScore = async (id) => {
    const updated = scores.filter(s => s.id !== id);
    await onSave({ testScores: updated });
    setScores(updated);
  };

  // Build chart points — score as percentage of maxScore
  const chartPoints = scores.map(s => ({
    label: `${s.year.slice(2)}\n${s.term.replace("Term ","")}`,
    score: s.maxScore ? Math.round(s.score / s.maxScore * 100) : s.score,
    raw:   s.score,
  }));

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <p style={{ fontFamily: MONO, fontSize: 11, color: C.blue, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>
          📝 School Test Scores
        </p>
        <Btn variant="ghost" small onClick={() => setAdding(!adding)}>
          {adding ? "Cancel" : "+ Add Score"}
        </Btn>
      </div>

      {/* Add form */}
      {adding && (
        <div style={{ background: C.bg, borderRadius: 10, padding: 14, marginBottom: 16, display: "grid", gap: 12 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div>
              <FieldLabel>Year</FieldLabel>
              <select value={year} onChange={e => setYear(e.target.value)} style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:8, padding:"8px 10px", fontSize:13, color:C.text, outline:"none" }}>
                {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div>
              <FieldLabel>Term</FieldLabel>
              <select value={term} onChange={e => setTerm(e.target.value)} style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:8, padding:"8px 10px", fontSize:13, color:C.text, outline:"none" }}>
                {SCHOOL_TERMS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <LightInput label="Score" value={score} onChange={setScore} placeholder="e.g. 78" />
            <LightInput label="Out of" value={maxScore} onChange={setMaxScore} placeholder="e.g. 100" />
          </div>
          <LightInput label="Notes (optional)" value={notes} onChange={setNotes} placeholder="e.g. Strong on listening, weak grammar" />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <Btn variant="primary" small onClick={addScore} disabled={saving || !score}>
              {saving ? "Saving…" : "Save Score"}
            </Btn>
          </div>
        </div>
      )}

      {scores.length === 0 ? (
        <p style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: "20px 0" }}>No test scores recorded yet.</p>
      ) : (
        <>
          {/* Line chart */}
          <div style={{ marginBottom: 16, overflowX: "auto" }}>
            <LineChart
              points={chartPoints}
              minY={0} maxY={100}
              width={Math.max(300, chartPoints.length * 80)}
              height={160}
            />
            <p style={{ fontSize: 10, color: C.muted, textAlign: "center", marginTop: 4 }}>Scores shown as % of total</p>
          </div>

          {/* Score table */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: `2px solid ${C.border}` }}>
                  {["Year","Term","Score","/ Max","%","Notes",""].map(h => (
                    <th key={h} style={{ padding: "6px 10px", textAlign: "left", fontFamily: MONO, fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: .5, fontWeight: 700 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {scores.map((s, i) => {
                  const pct = s.maxScore ? Math.round(s.score / s.maxScore * 100) : null;
                  const col = pct !== null ? (pct >= 80 ? C.green : pct >= 60 ? C.amber : C.coral) : C.muted;
                  return (
                    <tr key={s.id} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? C.bg : C.surface }}>
                      <td style={{ padding: "8px 10px", fontFamily: MONO, fontWeight: 700 }}>{s.year}</td>
                      <td style={{ padding: "8px 10px" }}>{s.term}</td>
                      <td style={{ padding: "8px 10px", fontFamily: MONO, fontWeight: 700, color: C.forest }}>{s.score}</td>
                      <td style={{ padding: "8px 10px", color: C.muted }}>{s.maxScore}</td>
                      <td style={{ padding: "8px 10px", fontFamily: MONO, fontWeight: 700, color: col }}>{pct !== null ? `${pct}%` : "—"}</td>
                      <td style={{ padding: "8px 10px", color: C.textDim, fontSize: 12 }}>{s.notes || "—"}</td>
                      <td style={{ padding: "8px 10px" }}>
                        <button onClick={() => removeScore(s.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 14, padding: 2 }} title="Remove">×</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

// ── Eiken History Section ─────────────────────────────────────────────────────
function EikenSection({ studentName, initialData, onSave }) {
  const [history,  setHistory]  = useState(initialData?.eikenHistory || []);
  const [adding,   setAdding]   = useState(false);
  const [saving,   setSaving]   = useState(false);
  // Form
  const [level,    setLevel]    = useState(EIKEN_LEVELS[2]);
  const [year,     setYear]     = useState(String(CURRENT_YEAR));
  const [session,  setSession]  = useState(EIKEN_SESSIONS[0]);
  const [stage,    setStage]    = useState("Primary"); // Primary | Secondary
  const [result,   setResult]   = useState("Pass");
  const [sectionScores, setSectionScores] = useState({});

  const criteria     = EIKEN_CRITERIA[level];
  const stageData    = stage === "Primary" ? criteria?.primary : criteria?.secondary;
  const hasSecondary = !!criteria?.secondary;

  const updateSectionScore = (name, val) => setSectionScores(prev => ({ ...prev, [name]: val }));

  const totalEntered = stageData?.sections.reduce((s, sec) => s + (Number(sectionScores[sec.name]) || 0), 0) || 0;
  const passScore    = stageData?.pass || 0;
  const autoResult   = stageData ? (totalEntered >= passScore ? "Pass" : "Fail") : result;

  const addEntry = async () => {
    const sections = stageData?.sections.map(sec => ({
      name:  sec.name,
      score: Number(sectionScores[sec.name]) || 0,
      max:   sec.max,
    })) || [];
    const totalScore = sections.reduce((s, x) => s + x.score, 0);
    const newEntry = {
      id: Date.now(), level, year, session, stage,
      result: stageData ? autoResult : result,
      totalScore, passScore: stageData?.pass || 0,
      sections, date: todayStr(),
    };
    const updated = [...history, newEntry].sort((a, b) => {
      const aKey = `${a.year}${EIKEN_SESSIONS.indexOf(a.session)}`;
      const bKey = `${b.year}${EIKEN_SESSIONS.indexOf(b.session)}`;
      return bKey.localeCompare(aKey);
    });
    setSaving(true);
    await onSave({ eikenHistory: updated });
    setHistory(updated);
    setSaving(false);
    setAdding(false);
    setSectionScores({});
  };

  const removeEntry = async (id) => {
    const updated = history.filter(e => e.id !== id);
    await onSave({ eikenHistory: updated });
    setHistory(updated);
  };

  // Latest level
  const latestPass = history.filter(e => e.result === "Pass").sort((a, b) => {
    return EIKEN_LEVELS.indexOf(b.level) - EIKEN_LEVELS.indexOf(a.level);
  })[0];

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <div>
          <p style={{ fontFamily: MONO, fontSize: 11, color: C.amber, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>
            🏆 Eiken History
          </p>
          {latestPass && (
            <p style={{ fontSize: 13, color: C.textDim, marginTop: 4 }}>
              Current level: <strong style={{ color: C.forest }}>{latestPass.level} ({EIKEN_GRADE_EN[latestPass.level]})</strong>
            </p>
          )}
        </div>
        <Btn variant="ghost" small onClick={() => setAdding(!adding)}>
          {adding ? "Cancel" : "+ Add Eiken"}
        </Btn>
      </div>

      {/* Add form */}
      {adding && (
        <div style={{ background: C.bg, borderRadius: 10, padding: 14, marginBottom: 16, display: "grid", gap: 12 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            <div>
              <FieldLabel>Level</FieldLabel>
              <select value={level} onChange={e => { setLevel(e.target.value); setSectionScores({}); }} style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:8, padding:"8px 10px", fontSize:13, color:C.text, outline:"none" }}>
                {EIKEN_LEVELS.map(l => <option key={l} value={l}>{l} — {EIKEN_GRADE_EN[l]}</option>)}
              </select>
            </div>
            <div>
              <FieldLabel>Year</FieldLabel>
              <select value={year} onChange={e => setYear(e.target.value)} style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:8, padding:"8px 10px", fontSize:13, color:C.text, outline:"none" }}>
                {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div>
              <FieldLabel>Session</FieldLabel>
              <select value={session} onChange={e => setSession(e.target.value)} style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:8, padding:"8px 10px", fontSize:13, color:C.text, outline:"none" }}>
                {EIKEN_SESSIONS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          </div>

          {hasSecondary && (
            <div>
              <FieldLabel>Stage</FieldLabel>
              <div style={{ display: "flex", gap: 8 }}>
                {["Primary","Secondary"].map(s => (
                  <button key={s} onClick={() => { setStage(s); setSectionScores({}); }} style={{
                    padding: "6px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                    border: `1.5px solid ${stage === s ? C.forest : C.border}`,
                    background: stage === s ? C.forest : "transparent",
                    color: stage === s ? C.white : C.muted,
                  }}>{s}</button>
                ))}
              </div>
            </div>
          )}

          {/* Section scores */}
          {stageData && (
            <div>
              <FieldLabel>Section Scores</FieldLabel>
              <div style={{ display: "grid", gap: 8 }}>
                {stageData.sections.map(sec => (
                  <div key={sec.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 13, color: C.textDim, flex: 1 }}>{sec.name}</span>
                    <input
                      type="number" min="0" max={sec.max}
                      value={sectionScores[sec.name] || ""}
                      onChange={e => updateSectionScore(sec.name, e.target.value)}
                      placeholder="0"
                      style={{ width: 80, background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:7, padding:"6px 10px", fontSize:13, color:C.text, outline:"none", textAlign:"right" }}
                    />
                    <span style={{ fontSize: 11, color: C.muted, minWidth: 52 }}>/ {sec.max}</span>
                  </div>
                ))}
                {/* Total vs pass */}
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: C.surface, borderRadius: 8, marginTop: 4 }}>
                  <span style={{ fontWeight: 700, fontSize: 13, flex: 1 }}>Total</span>
                  <span style={{ fontFamily: MONO, fontWeight: 700, fontSize: 15, color: totalEntered >= passScore ? C.green : C.coral }}>
                    {totalEntered}
                  </span>
                  <span style={{ fontSize: 11, color: C.muted }}>/ {stageData.total} &nbsp;(Pass: {passScore})</span>
                </div>
                <div style={{ padding: "8px 12px", borderRadius: 8, background: autoResult === "Pass" ? C.greenBg : C.coralBg, textAlign: "center" }}>
                  <span style={{ fontWeight: 700, fontSize: 14, color: autoResult === "Pass" ? C.green : C.coral }}>
                    {autoResult === "Pass" ? "✓ Pass" : "✗ Not passed"}
                  </span>
                </div>
              </div>
            </div>
          )}

          {!stageData && (
            <div>
              <FieldLabel>Result</FieldLabel>
              <div style={{ display: "flex", gap: 8 }}>
                {["Pass","Fail"].map(r => (
                  <button key={r} onClick={() => setResult(r)} style={{
                    flex: 1, padding: "8px", borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: "pointer",
                    border: `1.5px solid ${result === r ? (r === "Pass" ? C.green : C.coral) : C.border}`,
                    background: result === r ? (r === "Pass" ? C.greenBg : C.coralBg) : "transparent",
                    color: result === r ? (r === "Pass" ? C.green : C.coral) : C.muted,
                  }}>{r === "Pass" ? "✓ Pass" : "✗ Fail"}</button>
                ))}
              </div>
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <Btn variant="primary" small onClick={addEntry} disabled={saving}>
              {saving ? "Saving…" : "Save Eiken Record"}
            </Btn>
          </div>
        </div>
      )}

      {history.length === 0 ? (
        <p style={{ fontSize: 13, color: C.muted, textAlign: "center", padding: "20px 0" }}>No Eiken records yet.</p>
      ) : (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: `2px solid ${C.border}` }}>
                {["Level","Year","Session","Stage","Score","Pass mark","Result","Sections"].map(h => (
                  <th key={h} style={{ padding: "6px 10px", textAlign: "left", fontFamily: MONO, fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: .5, fontWeight: 700, whiteSpace: "nowrap" }}>{h}</th>
                ))}
                <th />
              </tr>
            </thead>
            <tbody>
              {history.map((e, i) => (
                <tr key={e.id} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? C.bg : C.surface }}>
                  <td style={{ padding: "8px 10px", fontWeight: 700, color: C.forest, whiteSpace: "nowrap" }}>{e.level}</td>
                  <td style={{ padding: "8px 10px", fontFamily: MONO }}>{e.year}</td>
                  <td style={{ padding: "8px 10px", fontSize: 12, color: C.textDim, whiteSpace: "nowrap" }}>{e.session.split(" ")[0]} {e.session.match(/\((.+)\)/)?.[1]}</td>
                  <td style={{ padding: "8px 10px", fontSize: 12, color: C.textDim }}>{e.stage}</td>
                  <td style={{ padding: "8px 10px", fontFamily: MONO, fontWeight: 700 }}>{e.totalScore || "—"}</td>
                  <td style={{ padding: "8px 10px", fontFamily: MONO, color: C.muted }}>{e.passScore || "—"}</td>
                  <td style={{ padding: "8px 10px" }}>
                    <span style={{ fontWeight: 700, color: e.result === "Pass" ? C.green : C.coral }}>
                      {e.result === "Pass" ? "✓ Pass" : "✗ Fail"}
                    </span>
                  </td>
                  <td style={{ padding: "8px 10px", fontSize: 11, color: C.muted }}>
                    {e.sections?.map(s => `${s.name}: ${s.score}`).join(" · ") || "—"}
                  </td>
                  <td style={{ padding: "8px 10px" }}>
                    <button onClick={() => removeEntry(e.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 14, padding: 2 }} title="Remove">×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Student Detail View (full profile page) ───────────────────────────────────
function StudentDetailView({ profile, allRecords, onBack }) {
  const attended = profile.classes - profile.absent;
  const attPct   = profile.classes > 0 ? Math.round(attended / profile.classes * 100) : 0;
  const posPct   = attended > 0 ? Math.round(profile.positive / attended * 100) : 0;
  const negPct   = attended > 0 ? Math.round(profile.negative / attended * 100) : 0;
  const neuPct   = attended > 0 ? Math.round((attended - profile.positive - profile.negative - profile.flag) / attended * 100) : 0;
  const barColor = posPct >= 60 ? C.green : posPct >= 30 ? C.amber : C.coral;

  const [studentRecord, setStudentRecord] = useState(null);
  const [recordLoading, setRecordLoading] = useState(true);

  useEffect(() => {
    setRecordLoading(true);
    loadStudentRecord(profile.name).then(data => {
      setStudentRecord(data);
      setRecordLoading(false);
    }).catch(() => {
      setStudentRecord({ testScores: [], eikenHistory: [], parentComments: [], referrals: [], onboarding: null });
      setRecordLoading(false);
    });
  }, [profile.name]);

  // Includes procedural checks (onboarding overdue, open follow-ups) once
  // studentRecord has loaded; before that it falls back to attendance/marks only.
  const health = computeStudentHealth(profile, studentRecord);

  // Merge partial saves (each section saves independently of the others)
  const handleRecordSave = async (partial) => {
    const merged = { ...studentRecord, ...partial };
    await saveStudentRecord(profile.name, merged);
    setStudentRecord(merged);
  };

  // Mark distribution pie
  const markData = [
    { label: "Positive", value: profile.positive, color: C.green  },
    { label: "Neutral",  value: attended - profile.positive - profile.negative - profile.flag, color: "#CBD5E1" },
    { label: "Concern",  value: profile.negative, color: C.coral  },
    { label: "Flag",     value: profile.flag,     color: C.amber  },
  ];

  // Per-class breakdown for this student
  const classStats = [...profile.classNames].map(cn => {
    const recs = allRecords.filter(r => r.className === cn && r.studentNames.includes(profile.name));
    const pos = recs.filter(r => (r.report?.marks?.[profile.name] || "none") === "positive").length;
    const neg = recs.filter(r => (r.report?.marks?.[profile.name] || "none") === "negative").length;
    const fl  = recs.filter(r => (r.report?.marks?.[profile.name] || "none") === "flag").length;
    const abs = recs.filter(r => (r.report?.marks?.[profile.name] || "none") === "absent").length;
    const att = recs.length - abs;
    return { cn, total: recs.length, pos, neg, fl, abs, att };
  });

  // Chronological log entries for this student
  const log = allRecords
    .filter(r => r.studentNames.includes(profile.name))
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(r => ({
      date:      r.date,
      className: r.className,
      mark:      r.report?.marks?.[profile.name] || "none",
      note:      r.report?.note || "",
      mood:      r.report?.mood || "",
      engagement:r.report?.engagement || "",
      feedbackSent: r.report?.feedbackSent || false,
    }));

  const fmtDateShort = (d) => new Date(d + "T12:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" });

  const markIcon = { positive:"✓", negative:"✗", flag:"🚩", absent:"○", none:"—" };
  const markCol  = { positive: C.green, negative: C.coral, flag: C.amber, absent: C.muted, none: C.border };
  const markBg   = { positive: C.greenBg, negative: C.coralBg, flag: C.amberBg, absent: "#F3F4F6", none: C.bg };

  return (
    <div className="fade-in">
      {/* Back button */}
      <button onClick={onBack} style={{
        background: "none", border: "none", cursor: "pointer", color: C.muted,
        fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6, marginBottom: 20,
      }}>← All Students</button>

      {/* Header */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, padding: "20px 22px", marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
          <div>
            <h2 style={{ fontFamily: SERIF, fontSize: 26, color: C.forest }}>{profile.name}</h2>
            <p style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>{[...profile.classNames].join(" · ")}</p>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, textAlign: "center" }}>
            <div style={{ background: C.bg, borderRadius: 9, padding: "10px 16px" }}>
              <p style={{ fontFamily: MONO, fontSize: 22, fontWeight: 700, color: C.forest }}>{attPct}%</p>
              <p style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>Attendance</p>
            </div>
            <div style={{ background: C.bg, borderRadius: 9, padding: "10px 16px" }}>
              <p style={{ fontFamily: MONO, fontSize: 22, fontWeight: 700, color: barColor }}>{posPct}%</p>
              <p style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>Standout rate</p>
            </div>
          </div>
        </div>

        {/* Health banner */}
        <div style={{
          display: "flex", gap: 12, alignItems: "flex-start", padding: "11px 14px",
          background: health.bg, borderRadius: 9, border: `1.5px solid ${health.color}`, marginBottom: 14,
        }}>
          <span style={{ fontWeight: 800, color: health.color, fontSize: 13, whiteSpace: "nowrap" }}>
            {HEALTH_ICON[health.level]} {health.label}
          </span>
          <span style={{ fontSize: 12, color: C.textMid, lineHeight: 1.5 }}>{health.reasons.join(" · ")}</span>
        </div>

        {/* Progress bar */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ height: 8, background: C.border, borderRadius: 99, overflow: "hidden", display: "flex" }}>
            <div style={{ width: `${posPct}%`, background: C.green, transition: "width .4s" }} />
            <div style={{ width: `${neuPct}%`, background: "#CBD5E1" }} />
            <div style={{ width: `${negPct}%`, background: C.coral }} />
          </div>
          <div style={{ display: "flex", gap: 16, marginTop: 6, fontSize: 11, flexWrap: "wrap" }}>
            <span style={{ color: C.green }}>✓ {profile.positive} positive</span>
            <span style={{ color: C.muted }}>{attended - profile.positive - profile.negative - profile.flag} neutral</span>
            <span style={{ color: C.coral }}>✗ {profile.negative} concern</span>
            <span style={{ color: C.amber }}>🚩 {profile.flag} flag</span>
            <span style={{ color: C.muted }}>○ {profile.absent} absent</span>
            <span style={{ color: C.muted, marginLeft: "auto" }}>{profile.classes} total logged</span>
          </div>
        </div>

        {/* Mark distribution pie */}
        {attended > 0 && (
          <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
            <PieChart data={markData} size={90} />
            <div style={{ display: "grid", gap: 5 }}>
              {markData.filter(d => d.value > 0).map(d => (
                <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 9, height: 9, borderRadius: 2, background: d.color, flexShrink: 0 }} />
                  <span style={{ fontSize: 12, color: C.textDim, minWidth: 56 }}>{d.label}</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: C.text, fontFamily: MONO }}>{d.value}</span>
                  <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO }}>
                    {Math.round(d.value / attended * 100)}%
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Per-class breakdown */}
      {classStats.length > 1 && (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 20 }}>
          <p style={{ fontFamily: MONO, fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 14 }}>By Class</p>
          <div style={{ display: "grid", gap: 8 }}>
            {classStats.map(cs => {
              const p = cs.att > 0 ? Math.round(cs.pos / cs.att * 100) : 0;
              return (
                <div key={cs.cn} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 12px", background: C.bg, borderRadius: 8 }}>
                  <span style={{ fontWeight: 600, fontSize: 13, color: C.forest, flex: 1 }}>{cs.cn}</span>
                  <div style={{ display: "flex", gap: 10, fontSize: 11 }}>
                    <span style={{ color: C.green, fontWeight: 700 }}>✓ {cs.pos}</span>
                    <span style={{ color: C.coral, fontWeight: 700 }}>✗ {cs.neg}</span>
                    {cs.fl  > 0 && <span style={{ color: C.amber, fontWeight: 700 }}>🚩 {cs.fl}</span>}
                    {cs.abs > 0 && <span style={{ color: C.muted, fontWeight: 700 }}>○ {cs.abs}</span>}
                  </div>
                  <div style={{ width: 60, height: 5, background: C.border, borderRadius: 99, overflow: "hidden" }}>
                    <div style={{ width: `${p}%`, height: "100%", background: p >= 60 ? C.green : p >= 30 ? C.amber : C.coral }} />
                  </div>
                  <span style={{ fontFamily: MONO, fontSize: 11, color: C.textDim, minWidth: 30, textAlign: "right" }}>{p}%</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Teacher notes mentioning this student */}
      {profile.mentions.length > 0 && (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 20 }}>
          <p style={{ fontFamily: MONO, fontSize: 11, color: C.purple, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 14 }}>
            💬 Teacher Notes Mentioning {profile.name}
          </p>
          <div style={{ display: "grid", gap: 10 }}>
            {profile.mentions.map((m, i) => {
              const markIcon2 = { positive:"✓", negative:"✗", flag:"🚩", absent:"○", none:"—" }[m.mark] || "—";
              const markCol2  = { positive: C.green, negative: C.coral, flag: C.amber, absent: C.muted, none: C.muted }[m.mark] || C.muted;
              return (
                <div key={i} style={{ padding: "12px 14px", background: C.purpleBg, borderRadius: 9, borderLeft: `3px solid ${C.purple}` }}>
                  {/* Header row */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: C.purple }}>{m.className}</span>
                    <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO }}>
                      {m.feedbackSent && <span style={{ color: C.blue, fontWeight: 700, marginRight: 6 }} title="Feedback sent to parents">✉ sent</span>}
                      {fmtDateShort(m.date)}
                    </span>
                  </div>
                  {/* Class ratings row */}
                  <div style={{ display: "flex", gap: 10, marginBottom: 8, flexWrap: "wrap" }}>
                    {m.mood && (
                      <span style={{ fontSize: 11, background: C.surface, borderRadius: 6, padding: "2px 8px", color: C.textDim }}>
                        {m.mood.split(" ")[0]} {m.mood.replace(/^[^\s]+\s/, "")}
                      </span>
                    )}
                    {m.engagement && (
                      <span style={{ fontSize: 11, background: C.surface, borderRadius: 6, padding: "2px 8px", color: C.textDim }}>
                        {m.engagement.split(" ")[0]} {m.engagement.replace(/^[^\s]+\s/, "")}
                      </span>
                    )}
                    {m.performance && (
                      <span style={{ fontSize: 11, background: C.surface, borderRadius: 6, padding: "2px 8px", color: C.textDim }}>
                        {m.performance.split(" ")[0]} {m.performance.replace(/^[^\s]+\s/, "")}
                      </span>
                    )}
                    {/* Student's own mark that day */}
                    <span style={{ fontSize: 11, fontWeight: 700, color: markCol2, background: C.surface, borderRadius: 6, padding: "2px 8px" }}>
                      {markIcon2} {m.mark === "none" ? "No mark" : m.mark}
                    </span>
                  </div>
                  {/* The note itself */}
                  <p style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>{m.note}</p>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* CS sections: onboarding, comments, referrals + scores */}
      {recordLoading ? (
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: 20, background: C.surface, borderRadius: 12, marginBottom: 20 }}>
          <div className="spin" style={{ width: 20, height: 20, border: `2px solid ${C.border}`, borderTopColor: C.forest, borderRadius: "50%" }} />
          <span style={{ fontSize: 13, color: C.muted }}>Loading records…</span>
        </div>
      ) : (
        <>
          <OnboardingSection
            initialData={studentRecord}
            onSave={handleRecordSave}
          />
          <ParentCommentsSection
            initialData={studentRecord}
            onSave={handleRecordSave}
          />
          <ReferralsSection
            initialData={studentRecord}
            onSave={handleRecordSave}
          />
          <TestScoresSection
            studentName={profile.name}
            initialData={studentRecord}
            onSave={handleRecordSave}
          />
          <EikenSection
            studentName={profile.name}
            initialData={studentRecord}
            onSave={handleRecordSave}
          />
        </>
      )}

      {/* Full chronological log */}
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18 }}>
        <p style={{ fontFamily: MONO, fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 14 }}>
          Lesson History ({log.length})
        </p>
        {log.length === 0 ? (
          <p style={{ fontSize: 13, color: C.muted }}>No lessons logged yet.</p>
        ) : (
          <div style={{ display: "grid", gap: 8 }}>
            {log.map((entry, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "flex-start", gap: 10, padding: "9px 12px",
                background: markBg[entry.mark] || C.bg, borderRadius: 8,
                border: `1px solid ${(markCol[entry.mark] || C.border)}22`,
              }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 7, flexShrink: 0,
                  background: markCol[entry.mark] || C.border,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 13, fontWeight: 700, color: C.white,
                }}>{markIcon[entry.mark] || "—"}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: entry.note ? 4 : 0 }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: C.forest }}>{entry.className}</span>
                    <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO, flexShrink: 0, marginLeft: 8 }}>
                      {entry.feedbackSent && <span style={{ color: C.blue, fontWeight: 700, marginRight: 6 }} title="Feedback sent">✉</span>}
                      {fmtDateShort(entry.date)}
                    </span>
                  </div>
                  {entry.note && (
                    <p style={{ fontSize: 12, color: C.textDim, lineHeight: 1.5, fontStyle: "italic" }}>"{entry.note}"</p>
                  )}
                  {(entry.mood || entry.engagement) && (
                    <p style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>
                      {entry.mood.split(" ")[0]} {entry.engagement.split(" ")[0]}
                    </p>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Analytics View ────────────────────────────────────────────────────────────
function AnalyticsView({ weekTemplates, onClose }) {
  const [loading,     setLoading]     = useState(true);
  const [records,     setRecords]     = useState([]);
  const [rangeMode,   setRangeMode]   = useState("week");
  const [rangeOffset, setRangeOffset] = useState(0);
  const [filterType,  setFilterType]  = useState("All");
  const [filterClass, setFilterClass] = useState("All");
  const [activeTab,   setActiveTab]   = useState("overview");
  const [searchName,  setSearchName]  = useState("");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [markFilter,  setMarkFilter]  = useState("All"); // All | positive | negative | flag | absent | mentions | health-red | health-yellow
  const [sortBy,      setSortBy]      = useState("auto"); // auto | health | name | attendance | positive | classes
  const [studentRecords, setStudentRecords] = useState({}); // name -> CS record, for procedural health checks

  const range = rangeMode === "week" ? isoWeekRange(rangeOffset)
              : rangeMode === "month" ? monthRange(rangeOffset)
              : { from: null, to: null, label: "All Time" };

  useEffect(() => {
    setLoading(true);
    const loader = rangeMode === "overall" ? loadAllReportsEver() : loadReportsInRange(range.from, range.to);
    loader.then(rows => {
      setRecords(buildAnalyticsRecords(rows, weekTemplates));
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [rangeMode, range.from, range.to]);

  // CS records don't depend on the date range — load once.
  useEffect(() => {
    loadAllStudentRecords().then(setStudentRecords).catch(() => setStudentRecords({}));
  }, []);

  // Health lookup used throughout this view — pulls in the matching CS record
  // (onboarding/follow-up data) so procedural issues count toward the score.
  const getHealth = (s) => computeStudentHealth(s, studentRecords[s.name]);

  const filtered = records.filter(r => {
    if (filterType  !== "All" && r.classType !== filterType)  return false;
    if (filterClass !== "All" && r.className !== filterClass) return false;
    return true;
  });

  const allClassNames = [...new Set(records.map(r => r.className))].sort();

  const makePieData = (recs, field, options, colors) =>
    options.map((o, i) => ({ label: o, value: aggregateCounts(recs, field, options)[o], color: colors[i] }));

  const PIE_COLORS = ["#059669","#34D399","#FCD34D","#F97316","#EF4444"];
  const PERF_COLORS = ["#059669","#34D399","#FCD34D","#F97316","#6B7280"];

  const moodData = makePieData(filtered, "mood",        MOODS,       PIE_COLORS);
  const engData  = makePieData(filtered, "engagement",  ENGAGEMENT,  PIE_COLORS);
  const perfData = makePieData(filtered, "performance", PERFORMANCE, PERF_COLORS);

  const classBreakdown = allClassNames.map(cn => {
    const recs = filtered.filter(r => r.className === cn);
    const allMarks = recs.flatMap(r => Object.values(r.report?.marks || {}));
    return {
      className: cn, classType: recs[0]?.classType || "Other", count: recs.length,
      pos: allMarks.filter(m => m === "positive").length,
      neg: allMarks.filter(m => m === "negative").length,
      fl:  allMarks.filter(m => m === "flag").length,
      abs: allMarks.filter(m => m === "absent").length,
      total: allMarks.length,
      recs,
    };
  }).filter(c => c.count > 0);

  const students = buildStudentProfiles(filtered);
  let filteredStudents = students.filter(s => {
    if (searchName && !s.name.toLowerCase().includes(searchName.toLowerCase())) return false;
    if (markFilter === "positive")      return s.positive > 0;
    if (markFilter === "negative")      return s.negative > 0;
    if (markFilter === "flag")          return s.flag > 0;
    if (markFilter === "absent")        return s.absent > 0;
    if (markFilter === "mentions")      return s.mentions.length > 0;
    if (markFilter === "health-red")    return getHealth(s).level === "red";
    if (markFilter === "health-yellow") return getHealth(s).level === "yellow";
    return true;
  });

  // Sorting. "auto" keeps the original behavior: alphabetical by default, and
  // most → least on whichever mark filter is active. Explicit sort options
  // override the filter-driven sort.
  const sortFieldByFilter = {
    positive: "positive",
    negative: "negative",
    flag:     "flag",
    absent:   "absent",
  };
  const healthRankOf = (s) => HEALTH_RANK[getHealth(s).level];
  const attRateOf    = (s) => s.classes > 0 ? (s.classes - s.absent) / s.classes : 1;
  const posRateOf    = (s) => { const at = s.classes - s.absent; return at > 0 ? s.positive / at : 0; };

  if (sortBy === "auto") {
    if (markFilter === "mentions") {
      filteredStudents = [...filteredStudents].sort((a, b) => b.mentions.length - a.mentions.length);
    } else if (markFilter === "health-red" || markFilter === "health-yellow") {
      filteredStudents = [...filteredStudents].sort((a, b) => healthRankOf(a) - healthRankOf(b));
    } else if (sortFieldByFilter[markFilter]) {
      const field = sortFieldByFilter[markFilter];
      filteredStudents = [...filteredStudents].sort((a, b) => b[field] - a[field]);
    }
  } else if (sortBy === "health") {
    filteredStudents = [...filteredStudents].sort((a, b) => healthRankOf(a) - healthRankOf(b));
  } else if (sortBy === "name") {
    filteredStudents = [...filteredStudents].sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortBy === "attendance") {
    filteredStudents = [...filteredStudents].sort((a, b) => attRateOf(a) - attRateOf(b));
  } else if (sortBy === "positive") {
    filteredStudents = [...filteredStudents].sort((a, b) => posRateOf(b) - posRateOf(a));
  } else if (sortBy === "classes") {
    filteredStudents = [...filteredStudents].sort((a, b) => b.classes - a.classes);
  }

  const Tab = ({ id, label }) => (
    <button onClick={() => { setActiveTab(id); setSelectedStudent(null); }} style={{
      padding: "7px 16px", borderRadius: 8, border: "none",
      background: activeTab === id ? C.forest : "transparent",
      color: activeTab === id ? C.white : C.textDim,
      fontWeight: 700, fontSize: 13, cursor: "pointer", transition: "all .15s",
    }}>{label}</button>
  );

  return (
    <div className="fade-in" style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 2000, overflowY: "auto" }}>
      <div style={{ maxWidth: 960, margin: "0 auto", padding: "24px 16px 56px" }}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start",
          marginBottom: 24, paddingBottom: 20, borderBottom: `1.5px solid ${C.border}` }}>
          <div>
            <p style={{ fontFamily: MONO, fontSize: 10, color: C.purple, letterSpacing: 2, fontWeight: 700, marginBottom: 4 }}>ANALYTICS</p>
            <h1 style={{ fontFamily: SERIF, fontSize: 26, color: C.forest }}>
              KANA <span style={{ color: C.amber, fontStyle: "italic" }}>Reports</span>
            </h1>
          </div>
          <Btn variant="ghost" small onClick={onClose}>← Back to Log</Btn>
        </div>

        <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
          <div style={{ display: "flex", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, overflow: "hidden" }}>
            {["week","month","overall"].map(m => (
              <button key={m} onClick={() => { setRangeMode(m); setRangeOffset(0); }} style={{
                padding: "6px 16px", border: "none", fontWeight: 700, fontSize: 13, cursor: "pointer",
                background: rangeMode === m ? C.forest : "transparent",
                color: rangeMode === m ? C.white : C.textDim, transition: "all .15s",
              }}>{m === "week" ? "Weekly" : m === "month" ? "Monthly" : "Overall"}</button>
            ))}
          </div>
          {rangeMode !== "overall" && (
            <>
              <button onClick={() => setRangeOffset(o => o - 1)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "6px 12px", cursor: "pointer", fontSize: 16, color: C.text }}>‹</button>
              <span style={{ fontFamily: SERIF, fontSize: 16, color: C.forest, minWidth: 160, textAlign: "center" }}>{range.label}</span>
              <button onClick={() => setRangeOffset(o => Math.min(o + 1, 0))} disabled={rangeOffset >= 0}
                style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "6px 12px", cursor: "pointer", fontSize: 16, color: C.text, opacity: rangeOffset >= 0 ? .4 : 1 }}>›</button>
            </>
          )}
          {rangeMode === "overall" && (
            <span style={{ fontFamily: SERIF, fontSize: 16, color: C.forest, minWidth: 160, textAlign: "center" }}>
              {range.label} <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>— since you started logging</span>
            </span>
          )}
          <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "6px 10px", fontSize: 13, color: C.text, cursor: "pointer" }}>
            <option value="All">All class types</option>
            {CLASS_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          <select value={filterClass} onChange={e => setFilterClass(e.target.value)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "6px 10px", fontSize: 13, color: C.text, cursor: "pointer" }}>
            <option value="All">All classes</option>
            {allClassNames.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))", gap: 10, marginBottom: 24 }}>
          {[
            { label: "Classes logged", value: filtered.length, col: C.forest },
            { label: "Total students", value: [...new Set(filtered.flatMap(r => r.studentNames))].length, col: C.purple },
            { label: "Absences",       value: filtered.flatMap(r => Object.values(r.report?.marks || {})).filter(m => m === "absent").length, col: C.coral },
            { label: "Positive marks", value: filtered.flatMap(r => Object.values(r.report?.marks || {})).filter(m => m === "positive").length, col: C.green },
            { label: "Flags",          value: filtered.flatMap(r => Object.values(r.report?.marks || {})).filter(m => m === "flag").length, col: C.amber },
            { label: "Feedback sent",  value: filtered.filter(r => r.report?.feedbackSent).length, col: C.blue },
          ].map(s => (
            <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
              <p style={{ fontFamily: SERIF, fontSize: 24, fontWeight: 700, color: s.col }}>{s.value}</p>
              <p style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{s.label}</p>
            </div>
          ))}
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 20, background: C.surface, padding: 5, borderRadius: 10, border: `1px solid ${C.border}`, width: "fit-content" }}>
          <Tab id="overview" label="Overview" />
          <Tab id="classes"  label="By Class" />
          <Tab id="students" label="Students" />
        </div>

        {loading ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: 60, gap: 12 }}>
            <div className="spin" style={{ width: 28, height: 28, border: `3px solid ${C.border}`, borderTopColor: C.forest, borderRadius: "50%" }} />
            <span style={{ fontFamily: MONO, fontSize: 13, color: C.muted }}>Loading data…</span>
          </div>
        ) : filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: 60 }}>
            <p style={{ fontFamily: SERIF, fontSize: 20, color: C.muted, marginBottom: 8 }}>No data yet</p>
            <p style={{ fontSize: 13, color: C.muted }}>Log some classes to see analytics here.</p>
          </div>
        ) : (
          <>
            {activeTab === "overview" && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
                <MetricPie title="Class Mood"         data={moodData} />
                <MetricPie title="Student Engagement" data={engData}  />
                <MetricPie title="Lesson Performance" data={perfData} />
              </div>
            )}

            {activeTab === "classes" && (
              <div style={{ display: "grid", gap: 12 }}>
                {classBreakdown.map(c => {
                  const cMood = makePieData(c.recs, "mood",        MOODS,       PIE_COLORS);
                  const cEng  = makePieData(c.recs, "engagement",  ENGAGEMENT,  PIE_COLORS);
                  const cPerf = makePieData(c.recs, "performance", PERFORMANCE, PERF_COLORS);
                  const posPct = c.total > 0 ? Math.round(c.pos / c.total * 100) : 0;
                  return (
                    <div key={c.className} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, borderLeft: `4px solid ${C.amber}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                        <div>
                          <h3 style={{ fontFamily: SERIF, fontSize: 18, color: C.forest }}>{c.className}</h3>
                          <p style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>{c.count} session{c.count !== 1 ? "s" : ""} · {c.classType}</p>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <p style={{ fontFamily: MONO, fontSize: 20, fontWeight: 700, color: posPct >= 60 ? C.green : posPct >= 30 ? C.amber : C.coral }}>{posPct}%</p>
                          <p style={{ fontSize: 10, color: C.muted }}>positive marks</p>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 12, marginBottom: 16, fontSize: 12 }}>
                        <span style={{ color: C.green, fontWeight: 700 }}>✓ {c.pos}</span>
                        <span style={{ color: C.coral, fontWeight: 700 }}>✗ {c.neg}</span>
                        <span style={{ color: C.amber, fontWeight: 700 }}>🚩 {c.fl}</span>
                        <span style={{ color: C.muted, fontWeight: 700 }}>○ {c.abs} absent</span>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                        {[{ title: "Mood", data: cMood }, { title: "Engagement", data: cEng }, { title: "Performance", data: cPerf }].map(({ title, data }) => (
                          <div key={title}>
                            <p style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: .8, marginBottom: 8 }}>{title}</p>
                            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                              <PieChart data={data} size={80} />
                              <div style={{ display: "grid", gap: 3 }}>
                                {data.filter(d => d.value > 0).map(d => {
                                  const t = data.reduce((s, x) => s + x.value, 0);
                                  return (
                                    <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                                      <div style={{ width: 7, height: 7, borderRadius: 2, background: d.color }} />
                                      <span style={{ fontSize: 10, color: C.muted }}>{t > 0 ? Math.round(d.value / t * 100) : 0}%</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {activeTab === "students" && (
              <div>
                {selectedStudent ? (
                  <StudentDetailView
                    profile={selectedStudent}
                    allRecords={filtered}
                    onBack={() => setSelectedStudent(null)}
                  />
                ) : (
                  <>
                    {/* Search + sort + mark filter */}
                    <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                        <input value={searchName} onChange={e => setSearchName(e.target.value)}
                          placeholder="Search student name…"
                          style={{ width: "100%", maxWidth: 240, background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", fontSize: 14, color: C.text, outline: "none" }}
                          onFocus={e => e.target.style.borderColor = C.forest}
                          onBlur={e => e.target.style.borderColor = C.border} />
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                          style={{ background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", fontSize: 13, color: C.text, cursor: "pointer", outline: "none" }}>
                          <option value="auto">Sort: Auto (follows filter)</option>
                          <option value="health">Sort: Health — at-risk first</option>
                          <option value="name">Sort: Name A–Z</option>
                          <option value="attendance">Sort: Attendance — lowest first</option>
                          <option value="positive">Sort: Positive % — highest first</option>
                          <option value="classes">Sort: Most logged</option>
                        </select>
                        <span style={{ fontSize: 12, color: C.muted }}>
                          {filteredStudents.length} student{filteredStudents.length !== 1 ? "s" : ""} · tap a card for full profile
                        </span>
                      </div>
                      {/* Mark filter chips */}
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                        <span style={{ fontSize: 11, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: .8, marginRight: 4 }}>Filter:</span>
                        {[
                          { id: "All",           label: "All",          bg: C.forest,  col: C.white  },
                          { id: "health-red",    label: "🔴 At risk",   bg: C.coralBg, col: C.coral  },
                          { id: "health-yellow", label: "🟡 Watch",     bg: C.amberBg, col: C.amber  },
                          { id: "positive",      label: "✓ Positive",   bg: C.greenBg, col: C.green  },
                          { id: "negative",      label: "✗ Concern",    bg: C.coralBg, col: C.coral  },
                          { id: "flag",          label: "🚩 Flagged",   bg: C.amberBg, col: C.amber  },
                          { id: "absent",        label: "○ Absent",     bg: "#F3F4F6", col: "#6B7280" },
                          { id: "mentions",      label: "💬 Has notes", bg: C.purpleBg,col: C.purple },
                        ].map(f => (
                          <button key={f.id} onClick={() => setMarkFilter(f.id)} style={{
                            padding: "5px 12px", borderRadius: 99, fontSize: 12, fontWeight: 700,
                            border: `1.5px solid ${markFilter === f.id ? f.col : C.border}`,
                            background: markFilter === f.id ? f.bg : "transparent",
                            color: markFilter === f.id ? f.col : C.muted,
                            cursor: "pointer", transition: "all .15s",
                          }}>{f.label}</button>
                        ))}
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
                      {filteredStudents.length === 0 ? (
                        <p style={{ fontSize: 13, color: C.muted, padding: 16 }}>No students match this filter.</p>
                      ) : filteredStudents.map(p => (
                        <StudentProfileCard key={p.name} profile={p} health={getHealth(p)} onClick={() => setSelectedStudent(p)} />
                      ))}
                    </div>
                  </>
                )}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [weekTemplates, setWeekTemplates] = useState(null);
  const [dayReports,    setDayReports]    = useState({});
  const [date,          setDate]          = useState(todayStr());
  const [reportSlot,    setReportSlot]    = useState(null);
  const [showTemplate,  setShowTemplate]  = useState(false);
  const [showAnalytics, setShowAnalytics] = useState(false);
  const [appStatus,     setAppStatus]     = useState("loading");
  const [syncStatus,    setSyncStatus]    = useState(null);
  const [liveTime,      setLiveTime]      = useState(nowHHMM());

  useEffect(() => {
    const t = setInterval(() => setLiveTime(nowHHMM()), 30000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const raw = await loadTemplates();
        setWeekTemplates(migrateTemplates(raw));
        setAppStatus("ready");
      } catch (e) {
        console.error("Failed to load templates:", e);
        setWeekTemplates(buildWeekTemplates());
        setAppStatus("error");
      }
    })();
  }, []);

  useEffect(() => {
    if (appStatus !== "ready" && appStatus !== "error") return;
    (async () => {
      try {
        const reports = await loadReportsForDate(date);
        setDayReports(reports);
      } catch (e) {
        console.error("Failed to load reports:", e);
        setDayReports({});
      }
    })();
  }, [date, appStatus]);

  const handleSaveReport = async (slot, report) => {
    setSyncStatus("saving");
    try {
      // Snapshot the class details as they are right now. This is what makes class
      // changes safe: if the class gets renamed (e.g. "Look 0" → "Look 1") or a
      // student is moved to a different class later, this saved report keeps
      // pointing at the class name / level / roster it actually happened under.
      const enrichedReport = {
        ...report,
        snapshot: {
          className:    slot.className,
          classType:    slot.classType,
          level:        slot.level,
          room:         slot.room,
          time:         slot.time,
          studentNames: slot.studentNames,
        },
      };
      await saveReport(date, slot.id, enrichedReport);
      setDayReports(prev => ({ ...prev, [slot.id]: enrichedReport }));
      setSyncStatus("saved");
      setTimeout(() => setSyncStatus(null), 2500);
    } catch (e) {
      console.error("Failed to save report:", e);
      setSyncStatus("error");
      setTimeout(() => setSyncStatus(null), 4000);
    }
  };

  const handleSaveTemplates = async (templates) => {
    setSyncStatus("saving");
    try {
      await saveTemplates(templates);
      setWeekTemplates(templates);
      setSyncStatus("saved");
      setTimeout(() => setSyncStatus(null), 2500);
    } catch (e) {
      console.error("Failed to save templates:", e);
      setSyncStatus("error");
      setTimeout(() => setSyncStatus(null), 4000);
    }
  };

  if (appStatus === "loading") {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", background:C.bg, gap:16 }}>
        <style>{css}</style>
        <div className="spin" style={{ width:32, height:32, border:`3px solid ${C.border}`, borderTopColor:C.forest, borderRadius:"50%" }} />
        <p style={{ fontFamily:MONO, fontSize:13, color:C.muted, letterSpacing:1 }}>Loading from cloud…</p>
      </div>
    );
  }

  const dow          = dayName(date);
  const slots        = (weekTemplates || buildWeekTemplates())[dow] || buildTemplate(dow);
  const isToday      = date === todayStr();
  const currentSlots = isToday ? getCurrentSlots(slots) : [];

  return (
    <>
      <style>{css}</style>

      {reportSlot && (
        <ReportModal
          slot={reportSlot}
          existing={dayReports[reportSlot.id]}
          onSave={r => handleSaveReport(reportSlot, r)}
          onClose={() => setReportSlot(null)}
        />
      )}

      {showTemplate && (
        <TemplateBuilder
          weekTemplates={weekTemplates || buildWeekTemplates()}
          onSave={handleSaveTemplates}
          onClose={() => setShowTemplate(false)}
        />
      )}

      {showAnalytics && (
        <AnalyticsView
          weekTemplates={weekTemplates || buildWeekTemplates()}
          onClose={() => setShowAnalytics(false)}
        />
      )}

      <div style={{ maxWidth:940, margin:"0 auto", padding:"28px 16px 56px", minHeight:"100vh" }}>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          marginBottom:26, flexWrap:"wrap", gap:12,
          paddingBottom:20, borderBottom:`1.5px solid ${C.border}` }}>
          <div>
            <h1 style={{ fontFamily:SERIF, fontSize:28, color:C.forest }}>
              KANA <span style={{ color:C.amber, fontStyle:"italic" }}>Daily Log</span>
            </h1>
            {appStatus === "error" && (
              <p style={{ fontSize:11, color:C.coral, marginTop:4, fontFamily:MONO }}>
                ⚠ Could not connect to cloud — check your connection
              </p>
            )}
          </div>
          <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            {syncStatus && <SyncBadge status={syncStatus} />}
            <DayStats slots={slots} dayReports={dayReports} />
            <Btn variant="purple" small onClick={() => setShowTemplate(true)}>⚙ Weekly Schedule</Btn>
            <Btn variant="green"  small onClick={() => setShowAnalytics(true)}>📊 Reports</Btn>
          </div>
        </div>

        <div style={{ marginBottom:22 }}>
          <DateNav date={date} onChange={setDate} />
        </div>

        {currentSlots.length > 0 && (
          <div style={{ marginBottom:20, borderRadius:12, overflow:"hidden", border:`2px solid ${C.forest}`, boxShadow:"0 4px 20px rgba(30,58,47,.12)" }}>
            <div style={{ background:C.forest, padding:"10px 18px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:C.green, boxShadow:`0 0 0 3px rgba(13,122,71,.3)`, animation:"pulse 2s ease infinite" }} />
                <span style={{ fontFamily:MONO, fontSize:11, color:C.amberBg, letterSpacing:2, fontWeight:700 }}>NOW LIVE</span>
              </div>
              <span style={{ fontFamily:MONO, fontSize:13, color:C.amberBg, fontWeight:600 }}>{liveTime}</span>
            </div>
            <div style={{ background:"#F0F7F3", padding:"12px 18px", display:"flex", gap:10, flexWrap:"wrap" }}>
              {currentSlots.map(slot => (
                <button key={slot.id} onClick={() => setReportSlot(slot)} style={{
                  flex:1, minWidth:180, padding:"10px 16px", borderRadius:9,
                  background: dayReports[slot.id] ? C.greenBg : C.white,
                  border:`1.5px solid ${dayReports[slot.id] ? C.green : C.forest}`,
                  cursor:"pointer", textAlign:"left", transition:"all .15s",
                }}
                  onMouseEnter={e => e.currentTarget.style.background = dayReports[slot.id] ? C.greenBg : "#F8F6F1"}
                  onMouseLeave={e => e.currentTarget.style.background = dayReports[slot.id] ? C.greenBg : C.white}
                >
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                    <span style={{ fontWeight:700, fontSize:14, color:C.forest }}>{slot.className}</span>
                    {slot.room && (
                      <span style={{ fontFamily:MONO, fontSize:10, fontWeight:700,
                        color: slot.room === "Room A" ? C.purple : C.forestMid,
                        background: slot.room === "Room A" ? C.purpleBg : C.greenDim,
                        padding:"1px 7px", borderRadius:99 }}>
                        {slot.room}
                      </span>
                    )}
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:12, color:C.textDim }}>{slot.studentNames.length} student{slot.studentNames.length !== 1 ? "s" : ""}</span>
                    <span style={{ fontSize:12, fontWeight:700, color: dayReports[slot.id] ? C.green : C.forest }}>
                      {dayReports[slot.id] ? "✓ Logged — tap to edit" : "Tap to log →"}
                    </span>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {isToday && currentSlots.length === 0 && slots.filter(s => s.className).length > 0 && (() => {
          const times = [...new Set(slots.map(s => s.time))].sort();
          const now   = nowHHMM();
          const next  = times.find(t => t > now);
          if (!next) return null;
          const nextSlots = slots.filter(s => s.time === next && s.className);
          if (!nextSlots.length) return null;
          return (
            <div style={{ marginBottom:20, borderRadius:10, padding:"10px 16px", background:C.amberBg, border:`1.5px solid ${C.amber}`, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:13, color:C.amber, fontFamily:MONO, fontWeight:600 }}>⏱ Next class at {next}</span>
              <span style={{ fontSize:13, color:C.textDim }}>— {nextSlots.map(s => s.className + (s.room ? ` (${s.room})` : "")).join(" · ")}</span>
            </div>
          );
        })()}

        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:18 }}>
          <p style={{ fontFamily:MONO, fontSize:11, color:C.purple, letterSpacing:2, textTransform:"uppercase", fontWeight:600 }}>{dow} Schedule</p>
          {dow === "Saturday" && <span style={{ fontSize:11, color:C.amber, fontWeight:600, fontFamily:MONO }}>09:00 – 17:00</span>}
          <button onClick={() => setShowTemplate(true)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, padding:"3px 10px", color:C.textDim, fontSize:11, cursor:"pointer" }}>Edit {dow}</button>
        </div>

        {isDualDay(dow) ? (() => {
          const times = slotTimesFor(dow);
          return (
            <div style={{ display:"grid", gap:14 }}>
              {times.map(time => {
                const pair = slots.filter(s => s.time === time);
                return (
                  <div key={time}>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                      {pair.map(slot => (
                        <SlotCard key={slot.id} slot={slot} report={dayReports[slot.id]}
                          isCurrent={isToday && currentSlots.some(s => s.id === slot.id)}
                          onLog={() => setReportSlot(slot)}
                          onEditTemplate={() => setShowTemplate(true)} />
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })() : (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(270px, 1fr))", gap:14 }}>
            {slots.map(slot => (
              <SlotCard key={slot.id} slot={slot} report={dayReports[slot.id]}
                isCurrent={isToday && currentSlots.some(s => s.id === slot.id)}
                onLog={() => setReportSlot(slot)}
                onEditTemplate={() => setShowTemplate(true)} />
            ))}
          </div>
        )}

        <p style={{ textAlign:"center", color:C.muted, fontSize:11, marginTop:32, fontFamily:MONO, letterSpacing:.5 }}>
          Synced to cloud · Data shared across all devices
        </p>
      </div>
    </>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);

</script>
</body>
</html>
