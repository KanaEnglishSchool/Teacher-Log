async function sbGet(table, match = "") {
  const url = `${SUPABASE_URL}/rest/v1/${table}${match}`;
  const res = await fetch(url, { headers: { ...headers } });
  if (!res.ok) throw new Error(`GET ${table} failed: ${res.status}`);
  return res.json();
}

async function sbUpsert(table, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { ...headers, "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`UPSERT ${table} failed: ${res.status} ${text}`);
  }
}

const MOODS       = ["😄 Excellent","🙂 Good","😐 Neutral","😕 Low","😤 Difficult"];

const WEEKDAY_TIMES  = ["13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];
const SATURDAY_TIMES = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];
const DUAL_DAYS      = ["Monday","Tuesday","Thursday","Saturday"];

// ── IMPORTANT: CLASS_TYPES must be defined BEFORE migrateTemplates ────────────
const CLASS_TYPES = ["Kids Class", "KPT", "Mini Kids / Playgroup B", "EWS", "Other"];

const slotTimesFor = (d) => d === "Saturday" ? SATURDAY_TIMES : WEEKDAY_TIMES;
const isDualDay    = (d) => DUAL_DAYS.includes(d);

const css = `

  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

// ── Helpers ───────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0, 10);
const dowOf    = (d) => new Date(d + "T12:00:00").getDay();
const dayName  = (d) => DAYS[dowOf(d)];
const fmtDay   = (d) => new Date(d + "T12:00:00").toLocaleDateString("en-GB", {
  weekday:"long", day:"numeric", month:"long", year:"numeric"
});
const addDays  = (d, n) => {
  const dt = new Date(d + "T12:00:00"); dt.setDate(dt.getDate() + n);
  return dt.toISOString().slice(0, 10);
};

const buildTemplate = (day) => {
  const times = slotTimesFor(day);
  if (isDualDay(day)) {
    return times.flatMap((time, i) => [
      { id: `slot_${i}_a`, time, room: "Room A", className: "", studentNames: [], classType: CLASS_TYPES[0], level: "" },
      { id: `slot_${i}_b`, time, room: "Room B", className: "", studentNames: [], classType: CLASS_TYPES[0], level: "" },
    ]);
  }
  return times.map((time, i) => ({ id: `slot_${i}`, time, room: null, className: "", studentNames: [], classType: CLASS_TYPES[0], level: "" }));
};

const buildWeekTemplates = () =>
  Object.fromEntries(DAYS.map(d => [d, buildTemplate(d)]));

// CLASS_TYPES is now defined above so this is safe
function migrateTemplates(raw) {
  const wt = raw || {};
  DAYS.forEach(d => {
    const expected = buildTemplate(d);
    if (!wt[d] || wt[d].length !== expected.length) {
      wt[d] = expected;
    } else {
      wt[d] = wt[d].map((slot, i) => ({
        ...slot,
        time:      expected[i]?.time || slot.time,
        room:      expected[i]?.room !== undefined ? expected[i].room : slot.room,
        id:        expected[i]?.id   || slot.id,
        classType: slot.classType || CLASS_TYPES[0],
        level:     slot.level     || "",
      }));
    }
  });
  return wt;
}

// ── Current time helpers ──────────────────────────────────────────────────────
const nowHHMM = () => {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
};

function getCurrentSlots(slots) {
  if (!slots || !slots.length) return [];
  const now = nowHHMM();
  const times = [...new Set(slots.map(s => s.time))].sort();
  let activeTime = null;
  for (let i = 0; i < times.length; i++) {
    const start = times[i];
    const end   = times[i + 1] || "23:59";
    if (now >= start && now < end) { activeTime = start; break; }
  }
  if (!activeTime) return [];
  return slots.filter(s => s.time === activeTime && s.className);
}

// ── Primitive UI ──────────────────────────────────────────────────────────────
const Btn = ({ children, onClick, variant = "primary", small, disabled, full, style: s = {} }) => {
  const variants = {
    primary: { bg: C.forest,      col: C.white,   bdr: "none" },
    ghost:   { bg: "transparent", col: C.text,    bdr: `1.5px solid ${C.border}` },
    danger:  { bg: C.coralBg,     col: C.coral,   bdr: `1.5px solid ${C.coral}` },
    green:   { bg: C.greenBg,     col: C.green,   bdr: `1.5px solid ${C.green}` },
    purple:  { bg: C.purpleBg,    col: C.purple,  bdr: `1.5px solid ${C.purple}` },
    amber:   { bg: C.amberBg,     col: C.amber,   bdr: `1.5px solid ${C.amber}` },
    dim:     { bg: C.bg,          col: C.textDim, bdr: `1.5px solid ${C.border}` },
  }[variant] || {};
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: variants.bg, color: variants.col, border: variants.bdr,
      borderRadius: 8, padding: small ? "5px 12px" : "9px 18px",
      fontSize: small ? 12 : 14, fontWeight: 600, letterSpacing: .2,
      opacity: disabled ? .4 : 1, cursor: disabled ? "not-allowed" : "pointer",
      width: full ? "100%" : undefined, transition: "opacity .15s", ...s,
    }}
      onMouseEnter={e => { if (!disabled) e.currentTarget.style.opacity = ".82"; }}
      onMouseLeave={e => { e.currentTarget.style.opacity = disabled ? ".4" : "1"; }}
    >{children}</button>
  );
};

const FieldLabel = ({ children, hint }) => (
  <div style={{ marginBottom: 6 }}>
    <span style={{ fontSize: 11, fontWeight: 700, color: C.textDim, textTransform: "uppercase", letterSpacing: .8 }}>{children}</span>
    {hint && <span style={{ fontSize: 11, color: C.muted, marginLeft: 6 }}>— {hint}</span>}
  </div>
);

const LightSelect = ({ label, hint, value, onChange, options }) => (
  <div>
    {label && <FieldLabel hint={hint}>{label}</FieldLabel>}

const LightInput = ({ label, value, onChange, placeholder, type = "text" }) => (

// ── Student Mark ──────────────────────────────────────────────────────────────
function StudentMark({ name, mark, onChange }) {
  const cfg = {
    positive: { bg: C.greenBg,       col: C.green,   border: C.green   },
    negative: { bg: C.coralBg,       col: C.coral,   border: C.coral   },
    flag:     { bg: C.amberBg,       col: C.amber,   border: C.amber   },
    absent:   { bg: "#F3F4F6",       col: "#6B7280", border: "#9CA3AF" },
    none:     { bg: "transparent",   col: C.muted,   border: C.border  },
  };
  const toggle  = (type) => onChange(mark === type ? "none" : type);
  const active  = cfg[mark] || cfg.none;
  const isAbsent = mark === "absent";

  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "8px 12px", borderRadius: 9,
      background: isAbsent ? "#F9FAFB" : C.bg,
      border: `1.5px solid ${mark !== "none" ? active.border : C.border}`,
      opacity: isAbsent ? .65 : 1,
      transition: "border-color .15s, opacity .15s",
    }}>
      <span style={{
        fontSize: 14, fontWeight: 600,
        color: mark !== "none" ? active.col : C.text,
        textDecoration: isAbsent ? "line-through" : "none",
      }}>{name}</span>
      <div style={{ display: "flex", gap: 5 }}>
        {[
          { type: "positive", icon: "✓",  title: "Stood out" },
          { type: "negative", icon: "✗",  title: "Concern"  },
          { type: "flag",     icon: "🚩", title: "Flag"     },
          { type: "absent",   icon: "○",  title: "Absent"   },
        ].map(({ type, icon, title }) => {
          const isActive = mark === type;
          const mc = cfg[type];
          return (
            <button key={type} title={title} onClick={() => toggle(type)} style={{
              width: 32, height: 32, borderRadius: 7,
              fontSize: type === "absent" ? 16 : 14, fontWeight: 700,
              border: `1.5px solid ${isActive ? mc.border : C.border}`,
              background: isActive ? mc.bg : C.surface,
              color: isActive ? mc.col : C.muted, cursor: "pointer", transition: "all .12s",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
              onMouseEnter={e => { if (!isActive) { e.currentTarget.style.borderColor = mc.border; e.currentTarget.style.color = mc.col; }}}
              onMouseLeave={e => { if (!isActive) { e.currentTarget.style.borderColor = C.border;  e.currentTarget.style.color = C.muted; }}}
            >{icon}</button>
          );
        })}
      </div>
    </div>
  );
}

// ── Report Modal ──────────────────────────────────────────────────────────────
function ReportModal({ slot, existing, onSave, onClose }) {
  const [mood,        setMood]        = useState(existing?.mood        || MOODS[1]);
  const [engagement,  setEngagement]  = useState(existing?.engagement  || ENGAGEMENT[1]);
  const [performance, setPerformance] = useState(existing?.performance || PERFORMANCE[1]);
  const [note,        setNote]        = useState(existing?.note        || "");
  const [marks,       setMarks]       = useState(existing?.marks       || {});
  const [feedbackSent, setFeedbackSent] = useState(existing?.feedbackSent || false);
  const [saving,      setSaving]      = useState(false);

  const setMark = (name, m) => setMarks(prev => ({ ...prev, [name]: m }));
  const getMark = (name)    => marks[name] || "none";

  const counts = {
    pos: slot.studentNames.filter(n => getMark(n) === "positive").length,
    neg: slot.studentNames.filter(n => getMark(n) === "negative").length,
    fl:  slot.studentNames.filter(n => getMark(n) === "flag").length,
    abs: slot.studentNames.filter(n => getMark(n) === "absent").length,
  };

  const handleSave = async () => {
    setSaving(true);
    await onSave({ mood, engagement, performance, note, marks, feedbackSent, savedAt: new Date().toISOString() });
    setSaving(false);
    onClose();
  };

  return (
    <div className="fade-in" style={{
      position:"fixed", inset:0, background:"rgba(30,58,47,.45)",
      display:"flex", alignItems:"center", justifyContent:"center",
      zIndex:1000, padding:16, overflowY:"auto",
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="slide-up" style={{
        background:C.surface, border:`1.5px solid ${C.border}`,
        borderRadius:16, width:"100%", maxWidth:520,
        maxHeight:"92vh", overflowY:"auto", padding:26,
        boxShadow:"0 20px 60px rgba(0,0,0,.15)",
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
          <div>
            <p style={{ fontFamily:MONO, fontSize:11, color:C.amber, letterSpacing:2, marginBottom:4, fontWeight:600 }}>{slot.time}</p>
            <h2 style={{ fontFamily:SERIF, fontSize:22, color:C.forest }}>{slot.className || "Unnamed Class"}</h2>
            <p style={{ fontSize:13, color:C.textDim, marginTop:3 }}>{slot.studentNames.length} student{slot.studentNames.length !== 1 ? "s" : ""}</p>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, fontSize:24, cursor:"pointer", padding:4, lineHeight:1 }}>×</button>
        </div>

        <div style={{ background:C.bg, borderRadius:12, padding:16, marginBottom:20, display:"grid", gap:14, border:`1px solid ${C.border}` }}>
          <p style={{ fontFamily:MONO, fontSize:10, color:C.amber, letterSpacing:2, textTransform:"uppercase", fontWeight:600 }}>Class Rating</p>
          <LightSelect label="1. General class mood / attitude"  value={mood}        onChange={setMood}        options={MOODS}       />
          <LightSelect label="2. How engaged were the students?" value={engagement}  onChange={setEngagement}  options={ENGAGEMENT}  />
          <LightSelect label="3. Performance vs lesson goals"    value={performance} onChange={setPerformance} options={PERFORMANCE} />
        </div>

        {slot.studentNames.length > 0 && (
          <div style={{ marginBottom:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <FieldLabel>Student marks</FieldLabel>
              <div style={{ display:"flex", gap:10, fontSize:12 }}>
                {counts.pos > 0 && <span style={{ color:C.green, fontWeight:700 }}>✓ {counts.pos}</span>}
                {counts.neg > 0 && <span style={{ color:C.coral, fontWeight:700 }}>✗ {counts.neg}</span>}
                {counts.fl  > 0 && <span style={{ color:C.amber, fontWeight:700 }}>🚩 {counts.fl}</span>}
                {counts.abs > 0 && <span style={{ color:C.muted, fontWeight:700 }}>○ {counts.abs} absent</span>}
              </div>
            </div>
            <p style={{ fontSize:12, color:C.muted, marginBottom:10 }}>✓ is reserved for students who stood out this class. Unmarked = normal, not a concern.</p>
            <div style={{ display:"grid", gap:6 }}>
              {slot.studentNames.map(name => (
                <StudentMark key={name} name={name} mark={getMark(name)} onChange={m => setMark(name, m)} />
              ))}
            </div>
          </div>
        )}

        <div style={{ marginBottom:14 }}>
          <FieldLabel hint="optional">Teacher note</FieldLabel>
          <textarea value={note} onChange={e => setNote(e.target.value)} rows={2}
            placeholder="Anything else worth recording..."
            style={{ width:"100%", background:C.bg, border:`1.5px solid ${C.border}`, borderRadius:8,
              padding:"9px 12px", fontSize:13, color:C.text, outline:"none", lineHeight:1.6 }}
            onFocus={e => e.target.style.borderColor = C.forest}
            onBlur={e => e.target.style.borderColor = C.border} />
        </div>

        <label style={{
          display:"flex", alignItems:"center", gap:10, cursor:"pointer",
          padding:"11px 14px", borderRadius:9, marginBottom:20,
          background: feedbackSent ? C.greenBg : C.bg,
          border:`1.5px solid ${feedbackSent ? C.green : C.border}`,
          transition:"all .15s",
        }}>
          <input type="checkbox" checked={feedbackSent}
            onChange={e => setFeedbackSent(e.target.checked)}
            style={{ width:17, height:17, accentColor:C.green, cursor:"pointer" }} />
          <div>
            <span style={{ fontSize:13, fontWeight:700, color: feedbackSent ? C.green : C.textMid }}>
              ✉ Feedback sent to parents
            </span>
            <p style={{ fontSize:11, color:C.muted, marginTop:1 }}>
              Check when the positive marks / notes were relayed (Output Relay)
            </p>
          </div>
        </label>

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end", alignItems:"center" }}>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" onClick={handleSave} disabled={saving}>
            {saving ? "Saving…" : "Save Report"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ── Template Builder ──────────────────────────────────────────────────────────

  const active = slots.filter(s => s.className);
  const logged = active.filter(s => dayReports[s.id]).length;
  const allMarks = active.flatMap(s => Object.values(dayReports[s.id]?.marks || {}));
  const pos = allMarks.filter(m => m === "positive").length;
  const neg = allMarks.filter(m => m === "negative").length;

  if (!active.length) return null;

    <div style={{ display:"flex", gap:16, flexWrap:"wrap", alignItems:"center" }}>
      <span style={{ fontFamily:MONO, fontSize:12, fontWeight:600, color: logged === active.length ? C.green : C.amber }}>

      {neg > 0 && <span style={{ fontSize:12, color:C.coral, fontWeight:700 }}>✗ {neg}</span>}
      {fl  > 0 && <span style={{ fontSize:12, color:C.amber, fontWeight:700 }}>🚩 {fl}</span>}

// ── Analytics helpers ─────────────────────────────────────────────────────────
function parseReportId(id) {
  const match = id.match(/^(\d{4}-\d{2}-\d{2})_(.+)$/);
  if (!match) return null;
  return { date: match[1], slotId: match[2] };
}

function buildAnalyticsRecords(rows, weekTemplates) {
  const records = [];
  rows.forEach(row => {
    const parsed = parseReportId(row.id);
    if (!parsed) return;
    const { date, slotId } = parsed;
    const snap = row.data?.snapshot;

    let className, room, time, classType, level, studentNames;

    if (snap && snap.className) {
      // New-style report: it carries its own class details from the moment it
      // was logged, so later template edits (rename, level change, roster change)
      // can't retroactively alter it.
      className    = snap.className;
      room         = snap.room;
      time         = snap.time;
      classType    = snap.classType || "Other";
      level        = snap.level     || "—";
      studentNames = snap.studentNames || [];
    } else {
      // Old-style report saved before snapshots existed — fall back to looking
      // the slot up in the current template (previous behavior).
      const dow = DAYS[new Date(date + "T12:00:00").getDay()];
      const daySlots = weekTemplates?.[dow] || [];
      const slot = daySlots.find(s => s.id === slotId);
      if (!slot || !slot.className) return;
      className    = slot.className;
      room         = slot.room;
      time         = slot.time;
      classType    = slot.classType || "Other";
      level        = slot.level     || "—";
      studentNames = slot.studentNames || [];
    }

    if (!className) return;

    records.push({
      date, slotId, dow: DAYS[new Date(date + "T12:00:00").getDay()],
      className, room, time, classType, level,
      studentNames,
      report:  row.data,
      savedAt: row.saved_at,
    });
  });
  return records;
}

function aggregateCounts(records, field, options) {
  const counts = {};
  options.forEach(o => counts[o] = 0);
  records.forEach(r => {
    const val = r.report?.[field];
    if (val && counts[val] !== undefined) counts[val]++;
  });
  return counts;
}

// Split a full name into tokens for matching: "Tanaka Yuu" → ["tanaka", "yuu"]
function nameTokens(fullName) {
  return fullName.trim().toLowerCase().split(/\s+/).filter(Boolean);
}

// Check whether a note mentions a student.
// Rules:
//  1. Only check students who are in the class this note was written for (rec.className matches).
//  2. Build a list of all name tokens for every student in THAT class.
//  3. For each token in THIS student's name: if the note contains that token AND no other
//     student in the same class has the same token, it's an unambiguous match.
//     If another student shares the token, require at least two tokens to match.
function noteMatchesStudent(note, studentName, classStudentNames) {
  const noteLower   = note.toLowerCase();
  const myTokens    = nameTokens(studentName);

  // tokens of other students in the same class
  const otherTokenSets = classStudentNames
    .filter(n => n !== studentName)
    .map(n => nameTokens(n));

  let matchedTokens = 0;
  for (const tok of myTokens) {
    // check as whole word — wrap in word-boundary-like check
    const re = new RegExp(`(?:^|[\\s,、。!?]|$)${tok}(?:[\\s,、。!?]|$)`, "i");
    if (re.test(note) || noteLower.includes(tok)) {
      matchedTokens++;
    }
  }

  if (matchedTokens === 0) return false;

  // If another student in the same class shares ALL matched tokens, require
  // additional tokens to distinguish (teacher should use last name).
  const ambiguous = otherTokenSets.some(otherToks =>
    myTokens.slice(0, matchedTokens).every(t => otherToks.includes(t))
  );

  // Ambiguous single-token match → only accept if we matched more than one token
  if (ambiguous && matchedTokens < 2) return false;

  return true;
}

function buildStudentProfiles(records) {
  const profiles = {};
  records.forEach(rec => {
    const marks    = rec.report?.marks || {};
    const note     = rec.report?.note  || "";
    const classStudentNames = rec.studentNames; // all students in THIS class/slot

    rec.studentNames.forEach(name => {
      if (!profiles[name]) {
        profiles[name] = {
          name, classes: 0, positive: 0, negative: 0, flag: 0, absent: 0,
          classNames: new Set(), mentions: [],
        };
      }
      const p = profiles[name];
      p.classes++;
      p.classNames.add(rec.className);
      const m = marks[name] || "none";
      if (m === "positive") p.positive++;
      else if (m === "negative") p.negative++;
      else if (m === "flag") p.flag++;
      else if (m === "absent") p.absent++;

      // Note matching: scoped to this student's class, handles first/last names
      if (note && noteMatchesStudent(note, name, classStudentNames)) {
        p.mentions.push({
          note,
          date:        rec.date,
          className:   rec.className,
          mark:        m,
          mood:        rec.report?.mood        || "",
          engagement:  rec.report?.engagement  || "",
          performance: rec.report?.performance || "",
          feedbackSent: rec.report?.feedbackSent || false,
        });
      }
    });
  });
  return Object.values(profiles).sort((a, b) => a.name.localeCompare(b.name));
}

// ── Customer health score ─────────────────────────────────────────────────────
// Positive marks are reserved for standout moments (see ReportModal hint), so a
// LOW positive rate is normal and is deliberately NOT used as a risk signal —
// otherwise every quiet, well-behaved student would look "at risk" for the crime
// of not having a stand-out day. Risk instead comes from three places:
//   1. Attendance — the student is disengaging physically
//   2. Concerns/flags — actual logged negative behavior/performance
//   3. Process gaps — onboarding steps overdue, or an unresolved parent
//      follow-up sitting open. These are service failures, not the student's.
// Transparent rules, no magic weights — every reason is shown to the teacher.
const HEALTH_RANK = { red: 0, yellow: 1, new: 2, green: 3 };
const HEALTH_ICON = { red: "🔴", yellow: "🟡", new: "⚪", green: "🟢" };

// Only ever moves a level toward worse (red < yellow < new < green in HEALTH_RANK).
const worseLevel = (current, candidate) =>
  HEALTH_RANK[candidate] < HEALTH_RANK[current] ? candidate : current;

// `record` is the student_records row (onboarding / parentComments) if it has
// been loaded; procedural checks are simply skipped when it hasn't (e.g. list
// views that haven't fetched every student's record yet).
function computeStudentHealth(profile, record) {
  const attended = profile.classes - profile.absent;
  if (profile.classes < 3) {
    return { level: "new", color: "#6B7280", bg: "#F3F4F6", label: "New",
      reasons: ["Fewer than 3 logged classes — not enough data yet"], attPct: null };
  }
  const attPct     = Math.round(attended / profile.classes * 100);
  const concernPct = attended > 0 ? Math.round((profile.negative + profile.flag) / attended * 100) : 0;

  const reasons = [];
  let level = "green";

  // 1. Attendance
  if (attPct < 85) { reasons.push(`Attendance ${attPct}%`); level = worseLevel(level, "yellow"); }
  if (attPct < 70) { reasons.push(`Attendance critically low (${attPct}%)`); level = worseLevel(level, "red"); }

  // 2. Concerns / flags — the actual behavior/performance signal
  if (concernPct >= 25) { reasons.push(`Concern/flag rate ${concernPct}%`); level = worseLevel(level, "yellow"); }
  if (concernPct >= 40) { reasons.push("Frequent concerns/flags"); level = worseLevel(level, "red"); }
  if (profile.negative >= 3) { reasons.push(`${profile.negative} negative marks logged`); level = worseLevel(level, "red"); }
  else if (profile.flag >= 2) { reasons.push(`${profile.flag} flags logged`); level = worseLevel(level, "yellow"); }

  // 3. Procedural issues — only checkable once the student's CS record is loaded
  if (record) {
    const openFollowUps = (record.parentComments || []).filter(c => c.followUp).length;
    if (openFollowUps > 0) {
      reasons.push(`${openFollowUps} unresolved parent follow-up${openFollowUps > 1 ? "s" : ""}`);
      level = worseLevel(level, openFollowUps >= 2 ? "red" : "yellow");
    }

    const ob = record.onboarding;
    if (ob && ob.startDate) {
      const daysSince = Math.floor((Date.now() - new Date(ob.startDate + "T12:00:00").getTime()) / 86400000);
      const items = ob.items || {};
      const phaseIncomplete = (phase) =>
        ONBOARDING_ITEMS.filter(i => i.phase === phase).some(i => !items[i.id]);
      let overduePhases = 0;
      if (daysSince >= 30 && phaseIncomplete(30)) overduePhases++;
      if (daysSince >= 60 && phaseIncomplete(60)) overduePhases++;
      if (daysSince >= 90 && phaseIncomplete(90)) overduePhases++;
      if (overduePhases > 0) {
        reasons.push(`Onboarding steps overdue (day ${daysSince})`);
        level = worseLevel(level, overduePhases >= 2 ? "red" : "yellow");
      }
    }
  }

  if (level === "green") reasons.push("No attendance, behavior, or process concerns");

  const meta = {
    green:  { color: C.green, bg: C.greenBg, label: "Healthy" },
    yellow: { color: C.amber, bg: C.amberBg, label: "Watch"   },
    red:    { color: C.coral, bg: C.coralBg, label: "At Risk" },
  }[level];

  return { level, ...meta, reasons, attPct };
}

function isoWeekRange(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return {
    from:  mon.toISOString().slice(0, 10),
    to:    sun.toISOString().slice(0, 10),
    label: offset === 0 ? "This Week" : offset === -1 ? "Last Week" : `${Math.abs(offset)}w ago`,
  };
}

function monthRange(offset = 0) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + offset;
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  return {
    from:  first.toISOString().slice(0, 10),
    to:    last.toISOString().slice(0, 10),
    label: first.toLocaleDateString("en-GB", { month: "long", year: "numeric" }),
  };
}

// ── SVG Pie Chart ─────────────────────────────────────────────────────────────
function PieChart({ data, size = 140 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return (
    <div style={{ width: size, height: size, borderRadius: "50%",
      background: C.border, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <span style={{ fontSize: 11, color: C.muted }}>No data</span>
    </div>
  );

  let cumAngle = -90;
  const slices = data.map(d => {
    const pct   = d.value / total;
    const angle = pct * 360;
    const start = cumAngle;
    cumAngle += angle;
    return { ...d, pct, startAngle: start, endAngle: cumAngle };
  });

  const toXY = (angle, r) => {
    const rad = (angle * Math.PI) / 180;
    return { x: 50 + r * Math.cos(rad), y: 50 + r * Math.sin(rad) };
  };

  const r = 40;
  const cx = 50, cy = 50;

  return (
    <svg viewBox="0 0 100 100" width={size} height={size} style={{ overflow: "visible" }}>
      {slices.map((s, i) => {
        if (s.value === 0) return null;
        const start = toXY(s.startAngle, r);
        const end   = toXY(s.endAngle,   r);
        const large = (s.endAngle - s.startAngle) > 180 ? 1 : 0;
        if (s.pct >= 0.9999) {
          return <circle key={i} cx={cx} cy={cy} r={r} fill={s.color} />;
        }
        return (
          <path key={i}
            d={`M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${large} 1 ${end.x} ${end.y} Z`}
            fill={s.color} stroke={C.white} strokeWidth="1"
          />
        );
      })}
      <circle cx={cx} cy={cy} r={22} fill={C.surface} />
      <text x={cx} y={cy - 4} textAnchor="middle" fontSize="10" fontWeight="700" fill={C.text}>{total}</text>
      <text x={cx} y={cy + 8} textAnchor="middle" fontSize="7" fill={C.muted}>classes</text>
    </svg>
  );
}

function PieLegend({ data, total }) {
  return (
    <div style={{ display: "grid", gap: 5, minWidth: 0, width: "100%" }}>
      {data.filter(d => d.value > 0).map(d => (
        <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0, width: "100%" }}>
          <div style={{ width: 10, height: 10, borderRadius: 3, background: d.color, flexShrink: 0 }} />
          <span style={{ fontSize: 12, color: C.textDim, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.label.replace(/^.+?\s/, "")}</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: C.text, fontFamily: MONO, flexShrink: 0 }}>{d.value}</span>
          <span style={{ fontSize: 11, color: C.muted, fontFamily: MONO, minWidth: 36, textAlign: "right", flexShrink: 0 }}>
            {total > 0 ? Math.round(d.value / total * 100) + "%" : "—"}
          </span>
        </div>
      ))}
    </div>
  );
}

function MetricPie({ title, data }) {
  const total = data.reduce((s, d) => s + d.value, 0);

// ── SVG Line Chart ────────────────────────────────────────────────────────────
function LineChart({ points, maxY = 100, minY = 0, width = 400, height = 160, passLine }) {
  if (!points || points.length === 0) return (
    <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <span style={{ fontSize: 12, color: C.muted }}>No data yet</span>
    </div>
  );

  const pad = { top: 16, right: 20, bottom: 36, left: 44 };
  const W = width  - pad.left - pad.right;
  const H = height - pad.top  - pad.bottom;
  const range = maxY - minY || 1;

  const toX = (i) => points.length === 1 ? W / 2 : (i / (points.length - 1)) * W;
  const toY = (v) => H - ((v - minY) / range) * H;

  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"} ${toX(i).toFixed(1)} ${toY(p.score).toFixed(1)}`).join(" ");

  // Y axis ticks
  const ticks = 4;
  const tickVals = Array.from({ length: ticks + 1 }, (_, i) => minY + Math.round((range / ticks) * i));

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" style={{ overflow: "visible", maxWidth: width }}>
      <g transform={`translate(${pad.left},${pad.top})`}>
        {/* Grid lines */}
        {tickVals.map(v => (
          <line key={v} x1={0} y1={toY(v)} x2={W} y2={toY(v)}
            stroke={C.border} strokeWidth="1" strokeDasharray="4 3" />
        ))}
        {/* Pass line */}
        {passLine !== undefined && (
          <>
            <line x1={0} y1={toY(passLine)} x2={W} y2={toY(passLine)}
              stroke={C.green} strokeWidth="1.5" strokeDasharray="6 3" opacity=".7" />
            <text x={W + 4} y={toY(passLine) + 4} fontSize="9" fill={C.green} fontFamily="monospace">Pass</text>
          </>
        )}
        {/* Y axis labels */}
        {tickVals.map(v => (
          <text key={v} x={-6} y={toY(v) + 4} fontSize="9" fill={C.muted}
            textAnchor="end" fontFamily="monospace">{v}</text>
        ))}
        {/* X axis labels */}
        {points.map((p, i) => (
          <text key={i} x={toX(i)} y={H + 18} fontSize="9" fill={C.muted}
            textAnchor="middle" fontFamily="monospace">{p.label}</text>
        ))}
        {/* Line */}
        <path d={pathD} fill="none" stroke={C.forest} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
        {/* Dots */}
        {points.map((p, i) => (
          <g key={i}>
            <circle cx={toX(i)} cy={toY(p.score)} r={5} fill={C.surface} stroke={C.forest} strokeWidth="2.5" />
            <text x={toX(i)} y={toY(p.score) - 9} fontSize="9" fill={C.forest}
              textAnchor="middle" fontWeight="700" fontFamily="monospace">{p.score}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

  const daysSince = startDate ? Math.floor((Date.now() - new Date(startDate + "T12:00:00").getTime()) / 86400000) : null;

  const persist = async (nextItems, nextStart) => {
    setSaving(true);
    try { await onSave({ onboarding: { startDate: nextStart, items: nextItems } }); }
    finally { setSaving(false); }
  };

  const toggle = (id) => {
    const ni = { ...items, [id]: !items[id] };
    setItems(ni);
    persist(ni, startDate);

    setStartDate(v);

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12 }}>

          <div key={phase} style={{ background: C.bg, borderRadius: 9, padding: "10px 12px" }}>

            </p>
            <div style={{ display: "grid", gap: 6 }}>
              {ONBOARDING_ITEMS.filter(i => i.phase === phase).map(item => {
                const checked = !!items[item.id];
                return (
                  <label key={item.id} style={{ display: "flex", alignItems: "flex-start", gap: 8, cursor: "pointer" }}>
